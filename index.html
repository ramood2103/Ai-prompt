<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PromptVerse — AI Prompt Browser</title>
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg:#0a0a0f;--bg2:#10101a;--bg3:#161625;--bg4:#1c1c32;
            --accent:#06d6a0;--accent2:#7c3aed;--accent3:#f59e0b;
            --text:#ededf5;--muted:#6e6e8a;--border:#262642;
            --danger:#f43f5e;
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        html,body{overflow:hidden;height:100%;font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text)}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
        .app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;overflow:hidden}
        @media(min-width:481px){.app{border-left:1px solid var(--border);border-right:1px solid var(--border)}}

        /* Header */
        .hdr{background:rgba(10,10,15,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(38,38,66,0.5);padding:10px 14px;flex-shrink:0;z-index:50;display:flex;align-items:center;justify-content:space-between}
        .hdr-logo{display:flex;align-items:center;gap:10px}
        .hdr-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);font-size:14px}
        .hdr h1{font-size:16px;font-weight:700;letter-spacing:-0.3px}.hdr p{font-size:10px;color:var(--muted)}
        .hdr-actions{display:flex;gap:6px}
        .hdr-btn{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s}
        .hdr-btn:hover{border-color:var(--accent);color:var(--accent)}

        /* Content area */
        .content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}

        /* Bottom nav */
        .bnav{background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(38,38,66,0.5);display:flex;justify-content:space-around;padding:6px 0 max(env(safe-area-inset-bottom),8px);flex-shrink:0;z-index:50}
        .bnav-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 14px;cursor:pointer;color:var(--muted);font-size:9px;font-weight:600;transition:all .2s;position:relative}
        .bnav-item i{font-size:18px;transition:transform .2s}.bnav-item.act{color:var(--accent)}.bnav-item.act i{transform:scale(1.15)}
        .bnav-dot{position:absolute;top:3px;right:10px;width:5px;height:5px;background:var(--accent3);border-radius:50%}

        /* Cards */
        .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .25s;position:relative}
        .card:hover{border-color:rgba(6,214,160,0.3);transform:translateY(-1px)}.card:active{transform:scale(0.97)}
        .card-img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--bg3)}
        .card-ov{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.88));padding:30px 8px 8px}
        .card-ov p{font-size:10px;color:rgba(255,255,255,0.88);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
        .card-badge{position:absolute;top:6px;right:6px;font-size:8px;font-weight:700;padding:2px 7px;border-radius:5px;border:1px solid rgba(6,214,160,0.3);background:rgba(6,214,160,0.15);color:var(--accent)}
        .card-foot{padding:8px 10px;display:flex;align-items:center;justify-content:space-between}
        .card-src{font-size:9px;color:var(--muted);background:var(--bg3);padding:2px 7px;border-radius:5px}
        .card-save{background:none;border:none;cursor:pointer;font-size:13px;padding:2px;transition:color .2s}
        .card-save.saved{color:var(--accent3)!important}

        /* Chips */
        .chips{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;-ms-overflow-style:none;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}
        .chip{display:inline-flex;align-items:center;gap:3px;padding:5px 12px;border-radius:16px;font-size:11px;font-weight:500;background:var(--bg3);color:var(--muted);border:1px solid transparent;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
        .chip:hover{border-color:var(--border);color:var(--text)}.chip.act{background:rgba(6,214,160,0.12);color:var(--accent);border-color:rgba(6,214,160,0.35)}

        /* Buttons */
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:11px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
        .btn:active{transform:scale(0.95)}.btn-p{background:var(--accent);color:var(--bg)}.btn-p:hover{filter:brightness(1.1)}
        .btn-s{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-s:hover{border-color:var(--accent);color:var(--accent)}
        .btn-sm{padding:5px 10px;font-size:10px;border-radius:8px}

        /* Search */
        .search-box{position:relative}.search-box input{width:100%;padding:11px 14px 11px 40px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .2s}.search-box input:focus{border-color:var(--accent)}.search-box input::placeholder{color:var(--muted)}
        .search-box .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px}

        /* Detail modal */
        .modal{position:fixed;inset:0;z-index:100;background:var(--bg);transform:translateY(100%);transition:transform .38s cubic-bezier(.16,1,.3,1);max-width:480px;margin:0 auto;overflow-y:auto;overflow-x:hidden}
        .modal.open{transform:translateY(0)}
        .modal-hdr{position:sticky;top:0;z-index:10;background:rgba(10,10,15,0.9);backdrop-filter:blur(16px);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
        .modal-img{width:100%;max-height:380px;object-fit:contain;background:var(--bg2)}
        .prompt-box{background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:12px;font-size:12px;line-height:1.7;color:#c0c0d8;word-break:break-word;position:relative}
        .param-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);font-size:10px;color:var(--muted)}

        /* Toast */
        .toast-wrap{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px}
        .toast{background:var(--bg4);color:var(--text);padding:8px 18px;border-radius:10px;font-size:12px;font-weight:500;border:1px solid var(--border);box-shadow:0 8px 28px rgba(0,0,0,0.5);animation:toastIn .3s ease,toastOut .3s ease 2s forwards;display:flex;align-items:center;gap:7px}

        /* Source panel */
        .src-card{padding:14px;border-radius:12px;cursor:pointer;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;gap:12px;transition:all .2s}
        .src-card:hover{border-color:rgba(6,214,160,0.3)}.src-card.sel{background:rgba(6,214,160,0.06);border-color:rgba(6,214,160,0.35)}
        .src-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .src-count{font-size:20px;font-weight:800;color:var(--accent)}

        /* Loading */
        .skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px}
        .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}

        /* Empty */
        .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;text-align:center;color:var(--muted)}
        .empty i{font-size:42px;margin-bottom:14px;opacity:0.25}

        /* Animations */
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes toastIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-12px)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        @keyframes bgShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

        .anim-up{animation:fadeUp .4s ease both}
        .anim-float{animation:float 4s ease-in-out infinite}
        .hero-bg{background:linear-gradient(135deg,rgba(6,214,160,0.06),rgba(124,58,237,0.06),rgba(6,214,160,0.03));background-size:300% 300%;animation:bgShift 8s ease infinite}

        /* Status bar */
        .status-bar{display:flex;gap:6px;padding:10px 14px;flex-wrap:wrap}
        .status-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;font-size:10px;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--muted)}
        .status-pill.ok{border-color:rgba(6,214,160,0.3);color:var(--accent)}
        .status-pill.err{border-color:rgba(244,63,94,0.3);color:var(--danger)}
        .status-pill.load{border-color:rgba(245,158,11,0.3);color:var(--accent3)}
        .status-dot{width:5px;height:5px;border-radius:50%}
        .status-pill.ok .status-dot{background:var(--accent)}.status-pill.err .status-dot{background:var(--danger)}.status-pill.load .status-dot{background:var(--accent3);animation:pulse 1s infinite}

        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- Header -->
    <header class="hdr">
        <div class="hdr-logo">
            <div class="hdr-icon"><i class="fas fa-wand-magic-sparkles"></i></div>
            <div><h1>PromptVerse</h1><p id="hdrSub">Loading sources...</p></div>
        </div>
        <div class="hdr-actions">
            <button class="hdr-btn" onclick="showSources()" aria-label="Sources"><i class="fas fa-database"></i></button>
            <button class="hdr-btn" onclick="refreshAll()" aria-label="Refresh"><i class="fas fa-arrows-rotate" id="refreshIcon"></i></button>
        </div>
    </header>

    <!-- Content -->
    <main class="content" id="mainContent"></main>

    <!-- Bottom Nav -->
    <nav class="bnav">
        <div class="bnav-item act" data-v="home" onclick="go('home')"><i class="fas fa-house"></i><span>Home</span></div>
        <div class="bnav-item" data-v="explore" onclick="go('explore')"><i class="fas fa-compass"></i><span>Explore</span></div>
        <div class="bnav-item" data-v="search" onclick="go('search')"><i class="fas fa-magnifying-glass"></i><span>Search</span></div>
        <div class="bnav-item" data-v="saved" onclick="go('saved')"><i class="fas fa-bookmark"></i><span>Saved</span><div class="bnav-dot" id="saveDot" style="display:none"></div></div>
    </nav>

    <!-- Detail Modal -->
    <div class="modal" id="detailModal"><div id="detailBody"></div></div>

    <!-- Source Modal -->
    <div class="modal" id="srcModal" style="z-index:110"><div id="srcBody"></div></div>

    <!-- Toasts -->
    <div class="toast-wrap" id="toasts"></div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const S = {
    view:'home', src:'all', cat:'all', sort:'trending',
    prompts:[], saved:JSON.parse(localStorage.getItem('pv_s')||'[]'),
    q:'', page:1, hasMore:true, loading:false,
    srcStatus:{}, // {civitai:'ok'|'err'|'load', lexica:..., meigen:..., builtin:...}
    srcCounts:{civitai:0,lexica:0,meigen:0,builtin:0,github:0},
    imgErr:new Set(), cache:{}
};

// ============================================================
// CATEGORIES
// ============================================================
const CATS = [
    {id:'all',n:'All',i:'fa-layer-group'},{id:'landscape',n:'Landscape',i:'fa-mountain-sun'},
    {id:'portrait',n:'Portrait',i:'fa-user'},{id:'fantasy',n:'Fantasy',i:'fa-hat-wizard'},
    {id:'anime',n:'Anime',i:'fa-star'},{id:'scifi',n:'Sci-Fi',i:'fa-rocket'},
    {id:'photo',n:'Photo',i:'fa-camera'},{id:'abstract',n:'Abstract',i:'fa-shapes'},
    {id:'3d',n:'3D',i:'fa-cube'},{id:'concept',n:'Concept',i:'fa-palette'},
    {id:'minimal',n:'Minimal',i:'fa-minus'},{id:'character',n:'Character',i:'fa-person'}
];

// ============================================================
// CORS PROXY ENGINE
// ============================================================
const PROXIES = [
    u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
    u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
];

async function pFetch(url, timeout=10000) {
    // Direct
    try {
        const c=new AbortController();const t=setTimeout(()=>c.abort(),timeout);
        const r=await fetch(url,{signal:c.signal});clearTimeout(t);
        if(r.ok){const txt=await r.text();try{return JSON.parse(txt)}catch{return txt}}
    } catch{}
    // Proxies
    for(const pf of PROXIES){
        try{
            const c=new AbortController();const t=setTimeout(()=>c.abort(),timeout);
            const r=await fetch(pf(url),{signal:c.signal});clearTimeout(t);
            if(r.ok){const txt=await r.text();try{return JSON.parse(txt)}catch{return txt}}
        } catch{}
    }
    throw new Error('Fetch failed: '+url);
}

// ============================================================
// CIVITAI SOURCE — Paginated API, hundreds of prompts
// ============================================================
async function fetchCivitai(page=1, limit=50, sort='Most Reactions', tag='') {
    const p=new URLSearchParams({limit,page,sort,nsfw:'false'});
    if(tag&&tag!=='all') p.set('tags',tag);
    const d=await pFetch(`https://civitai.com/api/v1/images?${p}`);
    if(!d||!d.items) throw new Error('Bad Civitai response');
    return d.items.filter(i=>i.meta&&i.meta.prompt).map(i=>({
        id:`c${i.id}`,img:i.url,prompt:i.meta.prompt||'',
        neg:i.meta.negativePrompt||'',model:i.meta.Model||i.meta.SDVersion||'',
        steps:i.meta.steps||0,cfg:i.meta.cfgScale||0,
        sampler:i.meta.sampler||'',seed:i.meta.seed||0,
        tags:(i.tags||[]).slice(0,8),likes:(i.stats?.likeCount)||0,
        src:'Civitai',w:i.width||512,h:i.height||512,
        cat:guessCat(i.meta.prompt||'',i.tags||[])
    }));
}

// ============================================================
// LEXICA SOURCE — Search engine
// ============================================================
async function fetchLexica(q='art') {
    const d=await pFetch(`https://lexica.art/api/v1/search?q=${encodeURIComponent(q)}`);
    if(!d||!d.images) throw new Error('Bad Lexica response');
    return d.images.map(i=>({
        id:`l${i.id}`,img:i.srcSmall||i.src,prompt:i.prompt||'',
        neg:'',model:'Stable Diffusion',steps:0,cfg:0,sampler:'',seed:i.seed||0,
        tags:[],likes:0,src:'Lexica',w:i.width||512,h:i.height||512,
        cat:guessCat(i.prompt||'',[])
    }));
}

// ============================================================
// MEIGEN.AI SCRAPER — Dedicated multi-strategy scraper
// ============================================================
async function scrapeMeigen() {
    const results = [];
    const urls = [
        'https://www.meigen.ai/',
        'https://www.meigen.ai/prompts',
        'https://www.meigen.ai/explore',
        'https://www.meigen.ai/trending',
        'https://www.meigen.ai/latest',
        'https://www.meigen.ai/new',
        'https://www.meigen.ai/categories',
        'https://www.meigen.ai/gallery'
    ];

    for (const url of urls) {
        try {
            const html = await pFetch(url, 8000);
            if (typeof html !== 'string') continue;
            const items = parseMeigenHTML(html, url);
            if (items.length > 0) {
                results.push(...items);
                break; // Found working page, no need to try more URLs
            }
        } catch { continue; }
    }

    // Also try search pages with common keywords
    const searchTerms = ['anime', 'portrait', 'landscape', 'fantasy', 'cyberpunk', 'girl', 'art'];
    for (const term of searchTerms) {
        try {
            const html = await pFetch(`https://www.meigen.ai/search?q=${encodeURIComponent(term)}`, 6000);
            if (typeof html === 'string') {
                const items = parseMeigenHTML(html, `search:${term}`);
                results.push(...items);
            }
        } catch { continue; }
    }

    // Deduplicate by prompt text
    const seen = new Set();
    return results.filter(p => {
        const key = p.prompt.substring(0, 80);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    });
}

function parseMeigenHTML(html, sourceUrl) {
    const items = [];

    // Strategy 1: Check for __NEXT_DATA__ (Next.js sites)
    const nextMatch = html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
    if (nextMatch) {
        try {
            const data = JSON.parse(nextMatch[1]);
            const prompts = extractFromNextData(data);
            if (prompts.length > 0) return prompts;
        } catch {}
    }

    // Strategy 2: Look for JSON in script tags (common in SPA sites)
    const jsonMatches = html.match(/<script[^>]*>\s*(\{[\s\S]*?"prompt"[\s\S]*?\})\s*<\/script>/g);
    if (jsonMatches) {
        for (const jm of jsonMatches) {
            try {
                const jsonStr = jm.replace(/<script[^>]*>/,'').replace(/<\/script>/,'');
                const data = JSON.parse(jsonStr);
                if (data.prompt) {
                    items.push(makeMeigenItem(data, sourceUrl));
                }
            } catch {}
        }
    }

    // Strategy 3: Parse DOM elements
    const doc = new DOMParser().parseFromString(html, 'text/html');

    // Try various selectors that might contain prompts
    const selectors = [
        '[class*="prompt"]', '[class*="card"]', '[class*="item"]',
        'article', '.gallery-item', '.prompt-card', '.item-card',
        '[class*="work"]', '[class*="image"]', '.grid-item',
        '[class*="content"]', 'li[class]', '.list-item'
    ];

    const found = new Set();
    for (const sel of selectors) {
        const els = doc.querySelectorAll(sel);
        els.forEach((el, idx) => {
            const text = el.textContent.trim();
            if (text.length > 30 && text.length < 2000 && !found.has(text.substring(0,60))) {
                // Check if this looks like a prompt (has descriptive keywords)
                if (looksLikePrompt(text)) {
                    found.add(text.substring(0,60));
                    const img = el.querySelector('img');
                    const imgSrc = img ? (img.getAttribute('src') || img.getAttribute('data-src') || '') : '';
                    items.push({
                        id:`m${sourceUrl.hashCode?.()||0}${idx}`,
                        img: imgSrc && !imgSrc.startsWith('data:') ? imgSrc : '',
                        prompt: cleanPrompt(text),
                        neg:'', model:'Unknown', steps:0, cfg:0, sampler:'', seed:0,
                        tags:extractTags(text), likes:0, src:'Meigen AI',
                        w:512, h:512, cat:guessCat(text,[])
                    });
                }
            }
        });
        if (items.length >= 5) break; // Enough from one selector
    }

    // Strategy 4: Look for image alt texts and surrounding text
    if (items.length === 0) {
        const imgs = doc.querySelectorAll('img[alt]');
        imgs.forEach((img, idx) => {
            const alt = img.getAttribute('alt') || '';
            const parent = img.closest('a, div, article, li');
            const parentText = parent ? parent.textContent.trim() : alt;
            if (parentText.length > 20 && looksLikePrompt(parentText)) {
                const src = img.getAttribute('src') || img.getAttribute('data-src') || '';
                items.push({
                    id:`mi${idx}`,
                    img: src && !src.startsWith('data:') && src.startsWith('http') ? src : '',
                    prompt: cleanPrompt(parentText),
                    neg:'', model:'Unknown', steps:0, cfg:0, sampler:'', seed:0,
                    tags:extractTags(parentText), likes:0, src:'Meigen AI',
                    w:512, h:512, cat:guessCat(parentText,[])
                });
            }
        });
    }

    return items;
}

function extractFromNextData(data, depth=0) {
    if (depth > 5) return [];
    const items = [];
    if (data && typeof data === 'object') {
        // Look for prompt arrays
        if (Array.isArray(data)) {
            for (const item of data) {
                if (item && item.prompt && typeof item.prompt === 'string' && item.prompt.length > 15) {
                    items.push(makeMeigenItem(item, 'nextdata'));
                }
                items.push(...extractFromNextData(item, depth+1));
            }
        } else {
            for (const key of Object.keys(data)) {
                if (key === 'prompts' || key === 'items' || key === 'data' || key === 'list' || key === 'results') {
                    if (Array.isArray(data[key])) {
                        for (const item of data[key]) {
                            if (item && item.prompt && typeof item.prompt === 'string') {
                                items.push(makeMeigenItem(item, 'nextdata'));
                            }
                        }
                    }
                }
                if (typeof data[key] === 'object' && data[key]) {
                    items.push(...extractFromNextData(data[key], depth+1));
                }
            }
        }
    }
    return items;
}

function makeMeigenItem(data, src) {
    return {
        id:`mn${Math.random().toString(36).substr(2,8)}`,
        img: data.image || data.imageUrl || data.src || data.thumbnail || data.img || '',

function looksLikePrompt(text) {

        'cinematic','photorealistic','illustration','concept','anime','portrait','landscape',
        'fantasy','realistic','quality','masterpiece','beautiful','dramatic','vibrant',
        'highly','intricate','ultra','sharp','focus','studio','professional','creative',
        'photo','image','drawing','sketch','design','effect','color','texture','scene',
        'character','background','atmosphere','mood','aesthetic','comprehensive',
        'masterpiece','best','amazing','stunning','gorgeous','elegant','ethereal'];
    const lower = text.toLowerCase();
    return keywords.some(k => lower.includes(k)) && text.length > 25;
}

function cleanPrompt(text) {
    return text.replace(/\s+/g,' ').replace(/[^\x20-\x7E\u0080-\uFFFF]/g,' ').trim().substring(0,600);
}

function extractTags(text) {
    const tagWords = ['anime','portrait','landscape','fantasy','scifi','sci-fi','cyberpunk',
        'steampunk','horror','romantic','minimalist','abstract','3d','photo','realistic',
        'painting','illustration','concept art','character design','environment',
        'dragon','robot','girl','boy','cat','dog','forest','city','space','ocean'];
    const lower = text.toLowerCase();
    return tagWords.filter(t => lower.includes(t)).slice(0,5);
}

async function fetchGithubPrompts() {

    const repos = [
        'https://raw.githubusercontent.com/DiamondDevs/stable-diffusion-prompt-generator/main/data/prompt_library.json',

    for (const url of repos) {
        try {
            const data = await pFetch(url, 6000);
            if (Array.isArray(data)) {
                data.forEach((item, idx) => {
                    const promptText = item.prompt || item.text || item.content || (typeof item === 'string' ? item : '');
                    if (promptText && promptText.length > 15) {
                        results.push({

                            img: item.image || item.url || '',
                            prompt: promptText,
                            neg: item.negative || item.negative_prompt || '',
                            model: item.model || 'Stable Diffusion',
                            steps: item.steps || 0, cfg: item.cfg || item.cfgScale || 0,
                            sampler: item.sampler || '', seed: item.seed || 0,
                            tags: item.tags || [], likes: 0, src:'GitHub',
                            w:512, h:512, cat: guessCat(promptText, item.tags||[])
                        });
                    }
                });
            } else if (data && typeof data === 'object') {
                // Might be categorized
                for (const [cat, prompts] of Object.entries(data)) {
                    if (Array.isArray(prompts)) {
                        prompts.forEach((item, idx) => {
                            const promptText = typeof item === 'string' ? item : (item.prompt || item.text || '');
                            if (promptText && promptText.length > 15) {
                                results.push({
                                    id:`gc${idx}${Math.random().toString(36).substr(2,4)}`,
                                    img: typeof item === 'object' ? (item.image||item.url||'') : '',
                                    prompt: promptText,
                                    neg: typeof item === 'object' ? (item.negative||'') : '',
                                    model: typeof item === 'object' ? (item.model||'Stable Diffusion') : 'Stable Diffusion',
                                    steps:0,cfg:0,sampler:'',seed:0,
                                    tags: typeof item === 'object' ? (item.tags||[cat]) : [cat],
                                    likes:0,src:'GitHub',w:512,h:512,cat:cat
                                });
                            }
                        });
                    }
                }
            }
        } catch { continue; }
    }
    return results;
}

// ============================================================
// CATEGORY GUESSER
// ============================================================
function guessCat(prompt, tags) {
    const p = prompt.toLowerCase();
    const t = tags.map(x=>(typeof x==='string'?x:x.name||'').toLowerCase());
    const all = p + ' ' + t.join(' ');
    if(/anime|manga|waifu|cel.shad|neon genesis/.test(all)) return 'anime';
    if(/portrait|face|girl|boy|woman|man|person|eyes|hair/.test(all)&&!/landscape|city|forest|mountain|ocean|sea/.test(all)) return 'portrait';
    if(/landscape|mountain|forest|ocean|sea|sunset|sunrise|lake|river|valley|field|meadow/.test(all)) return 'landscape';
    if(/fantasy|dragon|magic|wizard|elf|dwarf|fairy|enchanted|mythical|sword|castle/.test(all)) return 'fantasy';
    if(/sci.?fi|cyberpunk|space|robot|mech|futuristic|neon.city|spaceship|alien/.test(all)) return 'scifi';
    if(/photo|camera|lens|film|bokeh|depth.of.field|shot|photography|dslr/.test(all)) return 'photo';
    if(/abstract|fluid|fractal|geometric|pattern|texture|surreal/.test(all)) return 'abstract';
    if(/3d|render|blender|cinema.4d|octane|unreal|voxel|low.poly/.test(all)) return '3d';
    if(/concept|design|environment|vehicle|weapon|armor|prop/.test(all)) return 'concept';
    if(/minimal|minimalist|clean|simple|flat|icon|logo/.test(all)) return 'minimal';
    if(/character|warrior|knight|samurai|witch|princess|hero/.test(all)) return 'character';
    return 'concept';
}

// ============================================================
// CACHE (localStorage with 6hr expiry)
// ============================================================
const CACHE_KEY = 'pv_cache';
const CACHE_DUR = 6 * 60 * 60 * 1000;

function getCache() {
    try {
        const c = JSON.parse(localStorage.getItem(CACHE_KEY));
        if (c && Date.now() - c.t < CACHE_DUR) return c.d;
    } catch{}
    return null;
}
function setCache(data) {
    try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({d:data,t:Date.now()}));
    } catch{}
}

// ============================================================
// LOAD ALL SOURCES SIMULTANEOUSLY
// ============================================================
async function loadAllSources(forceRefresh = false) {
    // Check cache first
    if (!forceRefresh) {
        const cached = getCache();
        if (cached && cached.length > 20) {
            S.prompts = cached;
            S.srcCounts.builtin = BUILTIN.length;
            // Count sources
            cached.forEach(p => { if(S.srcCounts[p.src?.toLowerCase().replace(' ','')] !== undefined) S.srcCounts[p.src.toLowerCase().replace(' ','')]++; else S.srcCounts[p.src] = (S.srcCounts[p.src]||0)+1; });
            updateHdr();
            return;
        }
    }

    // Show loading
    S.loading = true;
    S.srcStatus = {civitai:'load',lexica:'load',meigen:'load',builtin:'ok',github:'load'};
    S.srcCounts = {civitai:0,lexica:0,meigen:0,builtin:BUILTIN.length,github:0};
    updateHdr();
    render();

    // Start with built-in
    S.prompts = [...BUILTIN];

    // Fetch all sources in parallel
    const results = await Promise.allSettled([
        // Civitai - fetch 2 pages for more content
        (async()=>{
            const all = [];
            for(let page=1;page<=3;page++){
                try{
                    const sorts=['Most Reactions','Newest','Most Comments'];
                    const items=await fetchCivitai(page,50,sorts[page-1]||'Most Reactions');
                    all.push(...items);
                }catch{break}
            }
            return all;
        })(),
        // Lexica - multiple searches
        (async()=>{
            const all=[];
            const terms=['art','portrait','landscape','anime','fantasy','cyberpunk','character design'];
            for(const t of terms){
                try{const items=await fetchLexica(t);all.push(...items)}catch{continue}
            }
            return all;
        })(),
        // Meigen AI
        (async()=>{
            return await scrapeMeigen();
        })(),
        // GitHub
        (async()=>{
            return await fetchGithubPrompts();
        })()
    ]);

    // Process Civitai
    if(results[0].status==='fulfilled' && results[0].value.length>0) {
        S.srcStatus.civitai='ok';
        S.srcCounts.civitai=results[0].value.length;
        S.prompts.push(...results[0].value);
    } else { S.srcStatus.civitai='err'; }

    // Process Lexica
    if(results[1].status==='fulfilled' && results[1].value.length>0) {
        S.srcStatus.lexica='ok';
        S.srcCounts.lexica=results[1].value.length;
        S.prompts.push(...results[1].value);
    } else { S.srcStatus.lexica='err'; }

    // Process Meigen
    if(results[2].status==='fulfilled' && results[2].value.length>0) {
        S.srcStatus.meigen='ok';
        S.srcCounts.meigen=results[2].value.length;
        S.prompts.push(...results[2].value);
    } else { S.srcStatus.meigen='err'; }

    // Process GitHub
    if(results[3].status==='fulfilled' && results[3].value.length>0) {
        S.srcStatus.github='ok';
        S.srcCounts.github=results[3].value.length;
        S.prompts.push(...results[3].value);
    } else { S.srcStatus.github='err'; }

    // Deduplicate by prompt text
    const seen = new Set();
    S.prompts = S.prompts.filter(p => {
        const key = p.prompt.substring(0,80).toLowerCase().trim();
        if(seen.has(key)) return false;
        seen.add(key); return true;
    });

    // Sort by likes descending
    S.prompts.sort((a,b) => (b.likes||0) - (a.likes||0));

    // Cache
    setCache(S.prompts);
    S.loading = false;
    updateHdr();
    render();
    toast(`Loaded ${S.prompts.length} prompts from ${Object.values(S.srcStatus).filter(s=>s==='ok').length} sources`, 'fa-check-circle');
}

function updateHdr() {
    const total = S.prompts.length;
    const okCount = Object.values(S.srcStatus).filter(s=>s==='ok').length;
    const el = document.getElementById('hdrSub');
    if(S.loading) el.textContent = 'Loading sources...';
    else el.textContent = `${total} prompts from ${okCount} sources`;
}

// ============================================================
// TOAST
// ============================================================
function toast(msg, icon='fa-check') {
    const c=document.getElementById('toasts');
    const t=document.createElement('div');
    t.className='toast';
    t.innerHTML=`<i class="fas ${icon}" style="color:var(--accent)"></i> ${msg}`;
    c.appendChild(t);
    setTimeout(()=>t.remove(),2500);
}

// ============================================================
function isSaved(id){return S.saved.some(p=>p.id===id)}
function toggleSave(p){
    if(isSaved(p.id)){S.saved=S.saved.filter(x=>x.id!==p.id);toast('Removed from saved','fa-bookmark')}
    else{S.saved.unshift({...p});toast('Saved to collection','fa-bookmark')}
    localStorage.setItem('pv_s',JSON.stringify(S.saved));
    document.getElementById('saveDot').style.display=S.saved.length?'block':'none';
    render();
}
async function copyPrompt(text){
    try{await navigator.clipboard.writeText(text)}catch{const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove()}
    toast('Copied to clipboard','fa-copy');
}

// ============================================================
// FILTERED PROMPTS
// ============================================================
function getFiltered() {
    let list = [...S.prompts];
    if(S.src!=='all') list = list.filter(p=>(p.src||'').toLowerCase().replace(' ','')===S.src);
    if(S.cat!=='all') list = list.filter(p=>p.cat===S.cat);
    if(S.q) {const q=S.q.toLowerCase(); list=list.filter(p=>p.prompt.toLowerCase().includes(q)||(p.tags||[]).some(t=>(typeof t==='string'?t:t.name||'').toLowerCase().includes(q)));}
    return list;
}

        case 'saved': main.innerHTML = renderSaved(); break;
    }
}

        </section>

        <!-- Featured -->
        ${featured?`<section style="padding:0 14px 16px">
            <h3 style="font-size:14px;font-weight:700;margin-bottom:10px">Featured</h3>
            <div onclick="openDetail(findP('${featured.id}'))" style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='rgba(6,214,160,0.3)'" onmouseout="this.style.borderColor='var(--border)'">
                ${featured.img?`<img src="${featured.img}" style="width:100%;height:180px;object-fit:cover" loading="lazy" onerror="this.style.display='none'">`:''}
                <div style="padding:12px">
                    <p style="font-size:12px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(featured.prompt.substring(0,150))}</p>
                    <div style="display:flex;gap:6px;margin-top:8px">
                        <span style="font-size:9px;color:var(--accent);background:rgba(6,214,160,0.1);padding:2px 7px;border-radius:5px">${featured.src}</span>
                        ${featured.model&&featured.model!=='Unknown'?`<span style="font-size:9px;color:var(--muted)">${esc(featured.model)}</span>`:''}
                    </div>
                </div>
            </div>
        </section>`:''}

        <!-- Trending grid -->
        <section style="padding:0 14px 16px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
                <h3 style="font-size:14px;font-weight:700">Trending</h3>
                <span onclick="go('explore')" style="font-size:11px;color:var(--accent);cursor:pointer;font-weight:600">See all <i class="fas fa-chevron-right" style="font-size:9px"></i></span>
            </div>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
                ${S.loading?Array(6).fill('').map(()=>`<div class="card"><div class="skel" style="aspect-ratio:1/1"></div><div style="padding:8px"><div class="skel" style="height:10px;width:60%;margin-bottom:4px"></div><div class="skel" style="height:8px;width:40%"></div></div></div>`).join(''):
                trending.length?trending.map((p,i)=>cardHTML(p,i)).join(''):
                `<div class="empty" style="grid-column:span 2"><i class="fas fa-wand-magic-sparkles"></i><p>Loading prompts...</p></div>`}
            </div>
        </section>

        <!-- More prompts -->
        ${recent.length?`<section style="padding:0 14px 16px">
            <h3 style="font-size:14px;font-weight:700;margin-bottom:10px">More to Explore</h3>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
                ${recent.map((p,i)=>cardHTML(p,i+12)).join('')}
            </div>
            <div style="text-align:center;margin-top:16px">
                <button onclick="go('explore')" class="btn btn-s"><i class="fas fa-compass"></i> Explore All ${filtered.length} Prompts</button>
            </div>
        </section>`:''}

        <!-- Saved -->
        ${savedRecent.length?`<section style="padding:0 14px 24px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
                <h3 style="font-size:14px;font-weight:700">Recently Saved</h3>
                <span onclick="go('saved')" style="font-size:11px;color:var(--accent);cursor:pointer;font-weight:600">View all <i class="fas fa-chevron-right" style="font-size:9px"></i></span>
            </div>
            ${savedRecent.map(p=>`<div onclick="openDetail(S.saved.find(x=>x.id==='${p.id}'))" style="display:flex;gap:10px;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;cursor:pointer;margin-bottom:6px;transition:all .2s" onmouseover="this.style.borderColor='rgba(6,214,160,0.3)'" onmouseout="this.style.borderColor='var(--border)'">
                ${p.img?`<img src="${p.img}" style="width:48px;height:48px;border-radius:9px;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">`:`<div style="width:48px;height:48px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-wand-magic-sparkles" style="color:var(--muted);font-size:14px"></i></div>`}
                <p style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:48px">${esc(p.prompt.substring(0,55))}</p>
            </div>`).join('')}
        </section>`:''}
    </div>`;
}

function renderExplore() {
    const filtered = getFiltered();
    return `<div class="anim-up">
        <section style="padding:14px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                <div><h2 style="font-size:16px;font-weight:700">Explore</h2><p style="font-size:10px;color:var(--muted)">${filtered.length} prompts</p></div>
                <div style="display:flex;gap:4px">
                    ${['all','civitai','lexica','meigen','github','builtin'].map(s=>`<div class="chip ${S.src===s?'act':''}" onclick="S.src='${s}';render()" style="font-size:9px;padding:4px 8px">${s==='all'?'All':s==='builtin'?'Built-in':s.charAt(0).toUpperCase()+s.slice(1)}</div>`).join('')}
                </div>
            </div>
            <div class="chips" style="margin-bottom:8px">
                ${CATS.map(c=>`<div class="chip ${S.cat===c.id?'act':''}" onclick="S.cat='${c.id}';render()">${c.n}</div>`).join('')}
            </div>
        </section>
        <section style="padding:0 14px 24px">
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
                ${filtered.length?filtered.map((p,i)=>cardHTML(p,i)).join(''):`<div class="empty" style="grid-column:span 2"><i class="fas fa-wand-magic-sparkles"></i><p>No prompts match your filters</p><button onclick="S.src='all';S.cat='all';render()" class="btn btn-p" style="margin-top:10px;font-size:11px">Clear Filters</button></div>`}
            </div>
        </section>
    </div>`;
}

function renderSearch() {
    return `<div class="anim-up">
        <section style="padding:14px">
            <h2 style="font-size:16px;font-weight:700;margin-bottom:12px">Search Prompts</h2>
            <div class="search-box" style="margin-bottom:10px">
                <i class="fas fa-magnifying-glass ico"></i>
                <input type="text" id="searchIn" placeholder="Describe what you want to create..." value="${esc(S.q)}" onkeydown="if(event.key==='Enter')doSearch()">
            </div>
            <button onclick="doSearch()" class="btn btn-p" style="width:100%"><i class="fas fa-magnifying-glass"></i> Search</button>
        </section>
        <section style="padding:0 14px">
            ${S.q?`<p style="font-size:11px;color:var(--muted);margin-bottom:10px">Results for "${esc(S.q)}" (${getFiltered().length})</p>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px">
                ${getFiltered().length?getFiltered().slice(0,30).map((p,i)=>cardHTML(p,i)).join(''):`<div class="empty" style="grid-column:span 2"><i class="fas fa-magnifying-glass"></i><p>No results found</p></div>`}
            </div>`:`
            <p style="font-size:12px;font-weight:600;margin-bottom:10px">Popular Searches</p>
            <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:20px">
                ${['anime girl','landscape','cyberpunk','portrait','fantasy art','dragon','space','robot','cat warrior','sunset','underwater','steampunk','vintage','forest','castle','neon city'].map(q=>`<div class="chip" onclick="S.q='${q}';doSearch()">${q}</div>`).join('')}
            </div>`}
        </section>
    </div>`;
}

function renderSaved() {
    return `<div class="anim-up">
        <section style="padding:14px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                <div><h2 style="font-size:16px;font-weight:700">Saved Prompts</h2><p style="font-size:10px;color:var(--muted)">${S.saved.length} saved</p></div>
                ${S.saved.length?`<button onclick="if(confirm('Clear all saved?')){S.saved=[];localStorage.setItem('pv_s','[]');document.getElementById('saveDot').style.display='none';render();toast('Cleared','fa-trash')}" class="btn btn-s btn-sm" style="color:var(--danger);border-color:rgba(244,63,94,0.3)"><i class="fas fa-trash"></i> Clear</button>`:''}
            </div>
        </section>
        <section style="padding:0 14px 24px">
            ${S.saved.length?S.saved.map((p,i)=>`
                <div onclick="openDetail(S.saved[${i}])" style="display:flex;gap:10px;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;cursor:pointer;margin-bottom:6px;transition:all .2s" onmouseover="this.style.borderColor='rgba(6,214,160,0.3)'" onmouseout="this.style.borderColor='var(--border)'">
                    ${p.img?`<img src="${p.img}" style="width:50px;height:50px;border-radius:9px;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">`:`<div style="width:50px;height:50px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-wand-magic-sparkles" style="color:var(--muted)"></i></div>`}
                    <div style="flex:1;min-width:0">
                        <p style="font-size:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5">${esc(p.prompt.substring(0,120))}</p>
                        <div style="display:flex;gap:5px;margin-top:4px"><span style="font-size:9px;color:var(--accent)">${p.src||'Built-in'}</span>${p.model&&p.model!=='Unknown'?`<span style="font-size:9px;color:var(--muted)">· ${esc(p.model)}</span>`:''}</div>
                    </div>
                    <button onclick="event.stopPropagation();toggleSave(S.saved[${i}])" style="background:none;border:none;color:var(--accent3);cursor:pointer;font-size:13px;padding:4px;align-self:flex-start"><i class="fas fa-bookmark"></i></button>
                </div>
            `).join(''):`<div class="empty"><i class="fas fa-bookmark"></i><p style="font-size:14px;font-weight:600;margin-bottom:4px">No saved prompts yet</p><p style="font-size:11px">Browse and bookmark prompts you love</p><button onclick="go('explore')" class="btn btn-p" style="margin-top:14px;font-size:11px"><i class="fas fa-compass"></i> Explore</button></div>`}
        </section>
    </div>`;
}

function cardHTML(p, idx) {
    const sv = isSaved(p.id);
    const hasImg = p.img && !S.imgErr.has(p.id);
    return `<div class="card anim-up" style="animation-delay:${Math.min(idx*40,500)}ms" onclick="openDetail(findP('${p.id}'))">
        ${hasImg?`<div style="position:relative;overflow:hidden"><img src="${p.img}" class="card-img" loading="lazy" onerror="this.style.display='none';S.imgErr.add('${p.id}');this.nextElementSibling.style.display='flex'"><div style="display:none;aspect-ratio:1/1;background:var(--bg3);align-items:center;justify-content:center" class="img-placeholder"><i class="fas fa-image" style="color:var(--muted);font-size:20px"></i></div><div class="card-ov"><p>${esc(p.prompt.substring(0,100))}</p></div></div>`:
        `<div style="aspect-ratio:1/1;background:var(--bg3);display:flex;align-items:center;justify-content:center;position:relative;padding:10px"><i class="fas fa-wand-magic-sparkles" style="font-size:24px;opacity:0.15;position:absolute"></i><p style="font-size:10px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:7;-webkit-box-orient:vertical;overflow:hidden;position:relative">${esc(p.prompt.substring(0,250))}</p></div>`}
        <div class="card-foot">
            <span class="card-src">${p.src||'Built-in'}</span>
            <button onclick="event.stopPropagation();toggleSave(findP('${p.id}'))" class="card-save ${sv?'saved':''}" style="color:${sv?'var(--accent3)':'var(--muted)'}" aria-label="${sv?'Unsave':'Save'}"><i class="fas fa-bookmark"></i></button>
        </div>
    </div>`;
}

// ============================================================
// NAVIGATION
// ============================================================
function go(view) {
    S.view = view;
    document.querySelectorAll('.bnav-item').forEach(el => el.classList.toggle('act', el.dataset.v === view));
    render();
    document.getElementById('mainContent').scrollTop = 0;
}

function doSearch() {
    const inp = document.getElementById('searchIn');
    S.q = inp ? inp.value.trim() : S.q;
    render();
}

// ============================================================
// AMBIENT ORBS
// ============================================================
function makeOrbs() {
    const c = document.createElement('div');
    c.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden';
    document.body.insertBefore(c, document.body.firstChild);
    const cols = ['rgba(6,214,160,0.03)','rgba(124,58,237,0.03)','rgba(6,182,212,0.025)'];
    for(let i=0;i<3;i++){
        const o=document.createElement('div');
        const sz=200+Math.random()*250;
        o.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;border-radius:50%;background:${cols[i]};filter:blur(70px);left:${Math.random()*100}%;top:${Math.random()*100}%;animation:float ${5+Math.random()*4}s ease-in-out infinite;animation-delay:${i*1.5}s`;
        c.appendChild(o);
    }
}

// ============================================================
// INIT
// ============================================================
document.getElementById('saveDot').style.display = S.saved.length ? 'block' : 'none';
makeOrbs();
render(); // Show built-in immediately
loadAllSources(); // Then fetch from all APIs
</script>
</body>
</html>
