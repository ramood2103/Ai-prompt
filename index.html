<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>PromptVerse</title>
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#10101a;--bg3:#161625;--bg4:#1c1c32;--accent:#06d6a0;--accent2:#7c3aed;--accent3:#f59e0b;--text:#ededf5;--muted:#6e6e8a;--border:#262642;--danger:#f43f5e}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overflow:hidden;height:100%;font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;overflow:hidden}
@media(min-width:481px){.app{border-left:1px solid var(--border);border-right:1px solid var(--border)}}
.hdr{background:rgba(10,10,15,.88);backdrop-filter:blur(20px);border-bottom:1px solid rgba(38,38,66,.5);padding:10px 14px;flex-shrink:0;z-index:50;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);font-size:14px;flex-shrink:0}
.hdr h1{font-size:16px;font-weight:700}.hdr p{font-size:10px;color:var(--muted)}
.hdr-btn{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent)}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.bnav{background:rgba(10,10,15,.92);backdrop-filter:blur(20px);border-top:1px solid rgba(38,38,66,.5);display:flex;justify-content:space-around;padding:6px 0 max(env(safe-area-inset-bottom),8px);flex-shrink:0;z-index:50}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 14px;cursor:pointer;color:var(--muted);font-size:9px;font-weight:600;transition:all .2s;position:relative}
.bnav-item i{font-size:18px;transition:transform .2s}.bnav-item.act{color:var(--accent)}.bnav-item.act i{transform:scale(1.15)}
.bnav-dot{position:absolute;top:3px;right:10px;width:5px;height:5px;background:var(--accent3);border-radius:50%}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .25s;position:relative}
.card:hover{border-color:rgba(6,214,160,.3);transform:translateY(-1px)}.card:active{transform:scale(.97)}
.card-img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--bg3)}
.card-ov{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.88));padding:30px 8px 8px}
.card-ov p{font-size:10px;color:rgba(255,255,255,.88);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-foot{padding:8px 10px;display:flex;align-items:center;justify-content:space-between}
.card-src{font-size:9px;color:var(--muted);background:var(--bg3);padding:2px 7px;border-radius:5px}
.card-save{background:none;border:none;cursor:pointer;font-size:13px;padding:2px;transition:color .2s}
.card-save.saved{color:var(--accent3)!important}
.chips{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}
.chip{display:inline-flex;align-items:center;gap:3px;padding:5px 12px;border-radius:16px;font-size:11px;font-weight:500;background:var(--bg3);color:var(--muted);border:1px solid transparent;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.chip:hover{border-color:var(--border);color:var(--text)}.chip.act{background:rgba(6,214,160,.12);color:var(--accent);border-color:rgba(6,214,160,.35)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:11px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
.btn:active{transform:scale(.95)}.btn-p{background:var(--accent);color:var(--bg)}.btn-s{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-sm{padding:5px 10px;font-size:10px;border-radius:8px}
.search-box{position:relative}.search-box input{width:100%;padding:11px 14px 11px 40px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .2s}.search-box input:focus{border-color:var(--accent)}.search-box input::placeholder{color:var(--muted)}
.search-box .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px}
.modal{position:fixed;inset:0;z-index:100;background:var(--bg);transform:translateY(100%);transition:transform .38s cubic-bezier(.16,1,.3,1);max-width:480px;margin:0 auto;overflow-y:auto}
.modal.open{transform:translateY(0)}
.modal-hdr{position:sticky;top:0;z-index:10;background:rgba(10,10,15,.9);backdrop-filter:blur(16px);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.modal-img{width:100%;max-height:380px;object-fit:contain;background:var(--bg2)}
.prompt-box{background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:12px;font-size:12px;line-height:1.7;color:#c0c0d8;word-break:break-word}
.param-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);font-size:10px;color:var(--muted)}
.toast-wrap{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px}
.toast{background:var(--bg4);color:var(--text);padding:8px 18px;border-radius:10px;font-size:12px;font-weight:500;border:1px solid var(--border);box-shadow:0 8px 28px rgba(0,0,0,.5);animation:ti .3s ease,to .3s ease 2s forwards;display:flex;align-items:center;gap:7px}
.src-card{padding:14px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;gap:12px}
.src-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.src-count{font-size:20px;font-weight:800;color:var(--accent)}
.skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;text-align:center;color:var(--muted)}.empty i{font-size:42px;margin-bottom:14px;opacity:.25}
.status-bar{display:flex;gap:6px;padding:10px 14px;flex-wrap:wrap}
.status-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;font-size:10px;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--muted)}
.status-pill.ok{border-color:rgba(6,214,160,.3);color:var(--accent)}.status-pill.err{border-color:rgba(244,63,94,.3);color:var(--danger)}.status-pill.load{border-color:rgba(245,158,11,.3);color:var(--accent3)}
.status-dot{width:5px;height:5px;border-radius:50%}.status-pill.ok .status-dot{background:var(--accent)}.status-pill.err .status-dot{background:var(--danger)}.status-pill.load .status-dot{background:var(--accent3);animation:pulse 1s infinite}
.log-line{font-size:10px;padding:4px 0;border-bottom:1px solid rgba(38,38,66,.3);line-height:1.4}.log-line .lok{color:var(--accent)}.log-line .lerr{color:var(--danger)}.log-line .linf{color:var(--accent3)}.log-line .ldim{color:var(--muted)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes ti{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes to{from{opacity:1}to{opacity:0;transform:translateY(-12px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes bgShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.anim-up{animation:fadeUp .4s ease both}
.hero-bg{background:linear-gradient(135deg,rgba(6,214,160,.06),rgba(124,58,237,.06),rgba(6,214,160,.03));background-size:300% 300%;animation:bgShift 8s ease infinite}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="app">
<header class="hdr"><div class="hdr-logo"><div class="hdr-icon"><i class="fas fa-wand-magic-sparkles"></i></div><div><h1>PromptVerse</h1><p id="hdrSub">Loading...</p></div></div><div style="display:flex;gap:6px"><button class="hdr-btn" onclick="showSources()" aria-label="Sources"><i class="fas fa-database"></i></button><button class="hdr-btn" onclick="refreshAll()" aria-label="Refresh"><i class="fas fa-arrows-rotate" id="refreshIcon"></i></button></div></header>
<main class="content" id="mc"></main>
<nav class="bnav"><div class="bnav-item act" data-v="home" onclick="go('home')"><i class="fas fa-house"></i><span>Home</span></div><div class="bnav-item" data-v="explore" onclick="go('explore')"><i class="fas fa-compass"></i><span>Explore</span></div><div class="bnav-item" data-v="search" onclick="go('search')"><i class="fas fa-magnifying-glass"></i><span>Search</span></div><div class="bnav-item" data-v="saved" onclick="go('saved')"><i class="fas fa-bookmark"></i><span>Saved</span><div class="bnav-dot" id="saveDot" style="display:none"></div></div></nav>
<div class="modal" id="detailModal"><div id="detailBody"></div></div>
<div class="modal" id="srcModal" style="z-index:110"><div id="srcBody"></div></div>
<div class="toast-wrap" id="toasts"></div>
</div>
<script>
// ============ STATE ============
var S={view:'home',src:'all',cat:'all',prompts:[],saved:JSON.parse(localStorage.getItem('pv_s')||'[]'),q:'',loading:false,srcStatus:{},srcCounts:{},imgErr:{},logs:[]};
var CATS=[{id:'all',n:'All',i:'fa-layer-group'},{id:'landscape',n:'Landscape',i:'fa-mountain-sun'},{id:'portrait',n:'Portrait',i:'fa-user'},{id:'fantasy',n:'Fantasy',i:'fa-hat-wizard'},{id:'anime',n:'Anime',i:'fa-star'},{id:'scifi',n:'Sci-Fi',i:'fa-rocket'},{id:'photo',n:'Photo',i:'fa-camera'},{id:'abstract',n:'Abstract',i:'fa-shapes'},{id:'3d',n:'3D',i:'fa-cube'},{id:'concept',n:'Concept',i:'fa-palette'},{id:'character',n:'Character',i:'fa-person'},{id:'minimal',n:'Minimal',i:'fa-minus'}];

// ============ LOGGING ============
function addLog(msg,type){
    type=type||'inf';
    S.logs.unshift({msg:msg,type:type,time:new Date().toLocaleTimeString()});
    if(S.logs.length>50)S.logs.length=50;
}

// ============ SMART FETCH WITH CORS PROXY RACING ============
function pFetch(url,timeout){
    timeout=timeout||15000;
    return new Promise(function(resolve,reject){
        var settled=false;
        var failCount=0;
        var totalAttempts=4;
        var urls=[
            url,
            'https://corsproxy.io/?'+encodeURIComponent(url),
            'https://api.allorigins.win/raw?url='+encodeURIComponent(url),
            'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(url)
        ];
        var delays=[0,600,2000,4000];

        function tryUrl(idx){
            if(settled)return;
            if(idx>=urls.length)return;
            var fetchUrl=urls[idx];
            var ctrl=new AbortController();
            var timer=setTimeout(function(){try{ctrl.abort()}catch(e){}},timeout);

            fetch(fetchUrl,{signal:ctrl.signal,mode:'cors'}).then(function(r){
                clearTimeout(timer);
                if(!r.ok)throw new Error('HTTP '+r.status);
                return r.text();
            }).then(function(txt){
                if(settled)return;
                settled=true;
                try{resolve(JSON.parse(txt))}catch(e){resolve(txt)}
            }).catch(function(err){
                clearTimeout(timer);
                if(settled)return;
                failCount++;
                if(failCount>=totalAttempts){
                    settled=true;
                    reject(new Error('All '+totalAttempts+' attempts failed for '+url));
                }
            });
        }

        // Stagger the attempts
        for(var i=0;i<urls.length;i++){
            (function(idx){
                setTimeout(function(){tryUrl(idx)},delays[idx]);
            })(i);
        }
    });
}

// ============ CATEGORY GUESSER ============
function guessCat(p,t){
    var a=(p+' '+(t||[]).join(' ')).toLowerCase();
    if(/anime|manga|waifu|ghibli|shinkai|cel.shad/.test(a))return'anime';
    if(/portrait|face|girl|boy|woman|man/.test(a)&&!/landscape|city|forest|ocean|mountain/.test(a))return'portrait';
    if(/landscape|mountain|forest|ocean|sunset|lake|river|valley/.test(a))return'landscape';
    if(/fantasy|dragon|magic|wizard|elf|fairy|castle|enchanted/.test(a))return'fantasy';
    if(/sci.?fi|cyberpunk|space|robot|mech|futuristic|alien/.test(a))return'scifi';
    if(/photo|camera|lens|bokeh|film|dslr/.test(a))return'photo';
    if(/abstract|fluid|fractal|geometric|surreal/.test(a))return'abstract';
    if(/3d|render|blender|octane|unreal|voxel/.test(a))return'3d';
    if(/concept|design|environment|vehicle|armor/.test(a))return'concept';
    if(/character|warrior|knight|samurai|witch|hero/.test(a))return'character';
    if(/minimal|minimalist|clean|simple|flat/.test(a))return'minimal';
    return'concept';
}

// ============ CIVITAI ============
function fetchCivitai(){
    addLog('Civitai: Starting fetch...','inf');
    var all=[];
    var sorts=['Most Reactions','Newest','Most Comments'];
    var p=Promise.resolve();
    for(var i=0;i<3;i++){
        (function(page,sort){
            p=p.then(function(){
                var params=new URLSearchParams({limit:50,page:page,sort:sort,nsfw:'false'});
                return pFetch('https://civitai.com/api/v1/images?'+params,20000).then(function(d){
                    if(!d||!d.items){addLog('Civitai page '+page+': No items returned','err');return}
                    var items=d.items.filter(function(it){return it.meta&&it.meta.prompt&&it.meta.prompt.length>20});
                    items=items.map(function(it){
                        return{id:'c'+it.id,img:it.url,prompt:it.meta.prompt,neg:it.meta.negativePrompt||'',model:it.meta.Model||it.meta.SDVersion||'',steps:it.meta.steps||0,cfg:it.meta.cfgScale||0,sampler:it.meta.sampler||'',seed:it.meta.seed||0,tags:(it.tags||[]).slice(0,8),likes:(it.stats&&it.stats.likeCount)||0,src:'Civitai',cat:guessCat(it.meta.prompt,it.tags)};
                    });
                    addLog('Civitai page '+page+' ('+sort+'): '+items.length+' prompts','lok');
                    all=all.concat(items);
                }).catch(function(e){addLog('Civitai page '+page+' failed: '+e.message,'lerr')});
            });
        })(i+1,sorts[i]);
    }
    return p.then(function(){addLog('Civitai total: '+all.length+' prompts',all.length>0?'lok':'lerr');return all});
}

// ============ LEXICA ============
function fetchLexica(){
    addLog('Lexica: Starting fetch...','inf');
    var all=[];
    var terms=['art','portrait','landscape','anime','fantasy','cyberpunk'];
    var p=Promise.resolve();
    terms.forEach(function(t){
        p=p.then(function(){
            return pFetch('https://lexica.art/api/v1/search?q='+encodeURIComponent(t),15000).then(function(d){
                if(!d||!d.images){addLog('Lexica "'+t+'": No images','err');return}
                var items=d.images.filter(function(it){return it.prompt&&it.prompt.length>20}).map(function(it){
                    return{id:'l'+it.id,img:it.srcSmall||it.src,prompt:it.prompt,neg:'',model:'Stable Diffusion',steps:0,cfg:0,sampler:'',seed:it.seed||0,tags:[],likes:0,src:'Lexica',cat:guessCat(it.prompt,[])};
                });
                addLog('Lexica "'+t+'": '+items.length+' prompts','lok');
                all=all.concat(items);
            }).catch(function(e){addLog('Lexica "'+t+'" failed: '+e.message,'lerr')});
        });
    });
    return p.then(function(){addLog('Lexica total: '+all.length+' prompts',all.length>0?'lok':'lerr');return all});
}

// ============ GENERIC SITE SCRAPER ============
var UI_GARBAGE=['GraphicPoster','BrandVideos','AIImages','TextToImage','Home','Explore','Trending','Latest','Popular','Categories','About','Contact','Login','Sign','Register','Profile','Settings','Follow','Share','Download','Upload','Create','Generate','Free','Premium','Pricing','FAQ','Blog','Docs','API','Terms','Privacy','Facebook','Twitter','Instagram','Discord','YouTube','Pinterest','Copyright','Cookie','Subscribe','Notification','Loading','404','Learn More','Read More','Get Started','Buy Now','Submit','Cancel','Close','Search','Filter','Sort','Refresh','Clear','Meigen','PromptSeen','GeminiPrompt','PromptSnap','Civitai','Lexica','Sign Up','Log In','Get Pro','Upgrade','Contact Us'];

function isGarbage(text){
    if(!text||text.length<35)return true;
    var t=text.trim();
    for(var i=0;i<UI_GARBAGE.length;i++){if(t===UI_GARBAGE[i])return true}
    if(t.length<60&&!t.includes(',')&&!t.includes('.')&&/^[A-Z][a-z]+([A-Z][a-z]+)+$/.test(t.replace(/\s/g,'')))return true;
    return false;
}

function scrapeSite(siteName,baseUrl){
    addLog(siteName+': Starting scrape...','inf');
    var urls=[
        baseUrl+'/api/prompts',baseUrl+'/api/v1/prompts',baseUrl+'/api/gallery',
        baseUrl+'/api/explore',baseUrl+'/api/trending',baseUrl+'/api/latest',
        baseUrl+'/api/search?q=art',baseUrl+'/api/search?q=portrait',
        baseUrl+'/',baseUrl+'/explore',baseUrl+'/trending',baseUrl+'/prompts',
        baseUrl+'/categories',baseUrl+'/gallery',baseUrl+'/latest'
    ];
    var results=[];
    var idx=0;

    return new Promise(function(resolve){
        function tryNext(){
            if(idx>=urls.length){
                addLog(siteName+' total: '+results.length+' prompts',results.length>0?'lok':'lerr');
                resolve(results);return;
            }
            var url=urls[idx];idx++;
            pFetch(url,10000).then(function(data){
                // Try JSON extraction
                if(data&&typeof data==='object'){
                    var found=extractJSON(data,siteName);
                    if(found.length>0){
                        addLog(siteName+' API ('+url+'): '+found.length+' prompts','lok');
                        results=results.concat(found);resolve(results);return;
                    }
                }
                // Try HTML parsing
                if(typeof data==='string'&&data.length>200){
                    var htmlItems=parseHTML(data,siteName);
                    if(htmlItems.length>0){
                        addLog(siteName+' HTML ('+url+'): '+htmlItems.length+' prompts','lok');
                        results=results.concat(htmlItems);resolve(results);return;
                    }
                }
                addLog(siteName+' ('+url+'): no data','ldim');
                tryNext();
            }).catch(function(e){
                addLog(siteName+' ('+url+'): '+e.message.substring(0,50),'ldim');
                tryNext();
            });
        }
        tryNext();
    });
}

function extractJSON(data,src,depth){
    depth=depth||0;if(depth>6)return[];
    var items=[];
    if(!data||typeof data!=='object')return items;
    if(Array.isArray(data)){
        for(var i=0;i<data.length;i++){
            var item=data[i];
            if(item&&typeof item==='object'&&typeof item.prompt==='string'&&item.prompt.length>20){
                items.push(makeItem(item,src));
            }
            items=items.concat(extractJSON(item,src,depth+1));
        }
    }else{
        var keys=Object.keys(data);
        for(var k=0;k<keys.length;k++){
            var key=keys[k];
            if(['prompts','items','data','list','results','works','images','cards','entries','gallery','prompt_list'].indexOf(key)!==-1&&Array.isArray(data[key])){
                for(var j=0;j<data[key].length;j++){
                    var el=data[key][j];
                    if(el&&typeof el==='object'&&typeof el.prompt==='string'&&el.prompt.length>20){
                        items.push(makeItem(el,src));
                    }
                }
            }
            if(typeof data[key]==='object'&&data[key]){
                items=items.concat(extractJSON(data[key],src,depth+1));
            }
        }
    }
    return items;
}

function makeItem(d,src){
    var img='';
    var fields=['image','imageUrl','src','thumbnail','img','cover','preview','image_url','photo','url'];
    for(var i=0;i<fields.length;i++){if(d[fields[i]]&&typeof d[fields[i]]==='string'){img=d[fields[i]];break}}
    if(img.startsWith('//'))img='https:'+img;
    var tags=[];
    if(Array.isArray(d.tags)){tags=d.tags.slice(0,6).map(function(t){return typeof t==='string'?t:t.name||''}).filter(Boolean)}
    return{id:'s'+Math.random().toString(36).substr(2,8),img:img,prompt:d.prompt||'',neg:d.negativePrompt||d.negative||d.neg_prompt||'',model:d.model||d.modelName||'',steps:d.steps||0,cfg:d.cfgScale||d.cfg||0,sampler:d.sampler||'',seed:d.seed||0,tags:tags,likes:d.likes||d.likeCount||0,src:src||'Scraper',cat:guessCat(d.prompt||'',tags)};
}

function parseHTML(html,src){
    var items=[];
    // __NEXT_DATA__
    var nm=html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
    if(nm){try{var nd=JSON.parse(nm[1]);var nf=extractJSON(nd,src);if(nf.length>0)return nf}catch(e){}}
    // Script blocks
    var scripts=html.match(/<script[^>]*>([\s\S]*?)<\/script>/gi)||[];

// ============ CACHE ============
var CACHE_KEY='pv_c3';var CACHE_DUR=6*60*60*1000;
function getCache(){try{var c=JSON.parse(localStorage.getItem(CACHE_KEY));if(c&&Date.now()-c.t<CACHE_DUR&&c.d&&c.d.length>5)return c.d}catch(e){}return null}
function setCache(data){try{localStorage.setItem(CACHE_KEY,JSON.stringify({d:data,t:Date.now()}))}catch(e){}}

// ============ LOAD ALL - INSTANT BUILT-IN + BACKGROUND APIS ============
function loadAllSources(force){
    addLog('Starting PromptVerse...','inf');
    var cached=null;
    if(!force){cached=getCache()}
    if(cached&&cached.length>5){
        S.prompts=cached;
        addLog('Loaded '+cached.length+' prompts from cache','lok');
    }else{
        S.prompts=BUILTIN.map(function(b){return Object.assign({},b)});
        addLog('Loaded '+BUILTIN.length+' built-in prompts','lok');
    }
    countSources();updateHdr();render();
    if(force||!cached||cached.length<=BUILTIN.length+5){fetchAllAPIs()}
}

function countSources(){
    S.srcCounts={civitai:0,lexica:0,meigen:0,promptseen:0,geminiprompt:0,promptsnap:0,github:0,builtin:0};
    S.prompts.forEach(function(p){
        var k=(p.src||'').toLowerCase().replace(/[\s.-]/g,'');
        if(k==='builtin')S.srcCounts.builtin++;
        else if(k==='civitai')S.srcCounts.civitai++;
        else if(k==='lexica')S.srcCounts.lexica++;
        else if(k==='meigenai')S.srcCounts.meigen++;
        else if(k==='promptseen')S.srcCounts.promptseen++;
        else if(k==='geminiprompt')S.srcCounts.geminiprompt++;
        else if(k==='promptsnap')S.srcCounts.promptsnap++;
        else if(k==='github')S.srcCounts.github++;
    });
}

function fetchAllAPIs(){
    S.srcStatus={civitai:'load',lexica:'load',meigen:'load',promptseen:'load',geminiprompt:'load',promptsnap:'load',builtin:'ok',github:'load'};
    updateHdr();render();

    var sources=[
        {key:'civitai',fn:function(){return fetchCivitai()},name:'Civitai'},
        {key:'lexica',fn:function(){return fetchLexica()},name:'Lexica'},
        {key:'meigen',fn:function(){return scrapeSite('Meigen AI','https://www.meigen.ai')},name:'Meigen AI'},
        {key:'promptseen',fn:function(){return scrapeSite('PromptSeen','https://promptseen.com')},name:'PromptSeen'},
        {key:'geminiprompt',fn:function(){return scrapeSite('GeminiPrompt','https://geminiprompt.app')},name:'GeminiPrompt'},
        {key:'promptsnap',fn:function(){return scrapeSite('PromptSnap','https://promptsnap.in')},name:'PromptSnap'},
        {key:'github',fn:function(){return fetchGithub()},name:'GitHub'}
    ];

    sources.forEach(function(src){
        src.fn().then(function(items){
            if(items&&items.length>0){
                S.srcStatus[src.key]='ok';
                S.srcCounts[src.key]=items.length;
                items.forEach(function(it){if(!it.src||it.src==='Scraper')it.src=src.name});
                S.prompts=S.prompts.concat(items);
                dedupe();countSources();setCache(S.prompts);
                addLog(src.name+': +'+items.length+' prompts loaded!','lok');
            }else{
                S.srcStatus[src.key]='err';
                addLog(src.name+': No prompts found','lerr');
            }
            updateHdr();render();
        }).catch(function(e){
            S.srcStatus[src.key]='err';
            addLog(src.name+' failed: '+(e.message||'unknown').substring(0,60),'lerr');
            updateHdr();render();
        });
    });
}

function dedupe(){
    var seen={};S.prompts=S.prompts.filter(function(p){var k=p.prompt.substring(0,60).toLowerCase().trim();if(seen[k])return false;seen[k]=true;return true});
    S.prompts.sort(function(a,b){return(b.likes||0)-(a.likes||0)});
}

function updateHdr(){
    var el=document.getElementById('hdrSub');
    var ok=0;for(var k in S.srcStatus){if(S.srcStatus[k]==='ok'||S.srcStatus[k]==='load')ok++}
    var loading=false;for(var k in S.srcStatus){if(S.srcStatus[k]==='load'){loading=true;break}}
    if(loading)el.textContent=S.prompts.length+' prompts, loading more...';
    else el.textContent=S.prompts.length+' prompts from '+(ok||1)+' sources';
}

function isSaved(id){return S.saved.some(function(p){return p.id===id})}
function toggleSave(p){if(!p)return;if(isSaved(p.id)){S.saved=S.saved.filter(function(x){return x.id!==p.id});toast('Removed','fa-bookmark')}else{S.saved.unshift(Object.assign({},p));toast('Saved!','fa-bookmark')}localStorage.setItem('pv_s',JSON.stringify(S.saved));document.getElementById('saveDot').style.display=S.saved.length?'block':'none';render()}
function copyPrompt(text){if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){toast('Copied!','fa-copy')}).catch(function(){fCopy(text)})}else{fCopy(text)}}
function fCopy(t){var el=document.createElement('textarea');el.value=t;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);toast('Copied!','fa-copy')}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

function render(){var m=document.getElementById('mc');switch(S.view){case'home':m.innerHTML=renderHome();break;case'explore':m.innerHTML=renderExplore();break;case'search':m.innerHTML=renderSearch();break;case'saved':m.innerHTML=renderSaved();break}}

function renderHome(){var f=getFiltered();var featured=f[0];var trending=f.slice(0,12);var recent=f.slice(12,24);var sr=S.saved.slice(0,4);
return'<div class="anim-up"><section class="hero-bg" style="padding:20px 14px 16px"><p style="font-size:11px;color:var(--accent);font-weight:700;margin-bottom:3px">PromptVerse</p><h2 style="font-size:22px;font-weight:800;line-height:1.15;margin-bottom:6px">Discover Perfect<br>AI Image Prompts</h2><p style="font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:14px">'+S.prompts.length+' prompts from '+(Object.keys(S.srcStatus).filter(function(k){return S.srcStatus[k]==='ok'}).length||1)+' sources</p><div onclick="go(\'search\')" style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;cursor:pointer"><i class="fas fa-magnifying-glass" style="color:var(--muted);font-size:13px"></i><span style="color:var(--muted);font-size:13px">Search prompts...</span></div></section><div class="status-bar">'+Object.keys(S.srcStatus).map(function(k){var v=S.srcStatus[k];var label=k==='meigen'?'Meigen':k==='promptseen'?'PromptSeen':k==='geminiprompt'?'GeminiPrompt':k==='promptsnap'?'PromptSnap':k==='builtin'?'Built-in':k.charAt(0).toUpperCase()+k.slice(1);return'<span class="status-pill '+v+'"><span class="status-dot"></span>'+label+'</span>'}).join('')+'</div><section style="padding:0 14px 14px"><div class="chips">'+CATS.map(function(c){return'<div class="chip '+(S.cat===c.id?'act':'')+'" onclick="S.cat=\''+c.id+'\';render()"><i class="fas '+c.i+'" style="font-size:9px"></i> '+c.n+'</div>'}).join('')+'</div></section>'+(featured?'<section style="padding:0 14px 16px"><h3 style="font-size:14px;font-weight:700;margin-bottom:10px">Featured</h3><div onclick="openDetail(findP(\''+featured.id+'\'))" style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer">'+(featured.img?'<img src="'+featured.img+'" style="width:100%;height:180px;object-fit:cover" loading="lazy" onerror="this.style.display=\'none\'">':'')+'<div style="padding:12px"><p style="font-size:12px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+esc(featured.prompt.substring(0,150))+'</p><div style="display:flex;gap:6px;margin-top:8px"><span style="font-size:9px;color:var(--accent);background:rgba(6,214,160,.1);padding:2px 7px;border-radius:5px">'+featured.src+'</span>'+(featured.model&&featured.model!=='Unknown'?'<span style="font-size:9px;color:var(--muted)">'+esc(featured.model)+'</span>':'')+'</div></div></div></section>':'')+'<section style="padding:0 14px 16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h3 style="font-size:14px;font-weight:700">Trending</h3><span onclick="go(\'explore\')" style="font-size:11px;color:var(--accent);cursor:pointer;font-weight:600">See all</span></div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">'+(trending.length?trending.map(function(p,i){return cardHTML(p,i)}).join(''):'')+'</div></section>'+(recent.length?'<section style="padding:0 14px 16px"><h3 style="font-size:14px;font-weight:700;margin-bottom:10px">More</h3><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">'+recent.map(function(p,i){return cardHTML(p,i+12)}).join('')+'</div><div style="text-align:center;margin-top:16px"><button onclick="go(\'explore\')" class="btn btn-s"><i class="fas fa-compass"></i> Explore All '+f.length+'</button></div></section>':'')+(sr.length?'<section style="padding:0 14px 24px"><h3 style="font-size:14px;font-weight:700;margin-bottom:10px">Saved</h3>'+sr.map(function(p){return'<div onclick="openDetail(S.saved.find(function(x){return x.id===\''+p.id+'\'}))" style="display:flex;gap:10px;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;cursor:pointer;margin-bottom:6px">'+(p.img?'<img src="'+p.img+'" style="width:48px;height:48px;border-radius:9px;object-fit:cover;flex-shrink:0" onerror="this.style.display=\'none\'">':'<div style="width:48px;height:48px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-wand-magic-sparkles" style="color:var(--muted);font-size:14px"></i></div>')+'<p style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:48px">'+esc(p.prompt.substring(0,55))+'</p></div>'}).join('')+'</section>':'')+'</div>'}

function renderExplore(){var f=getFiltered();var srcChips=['all','civitai','lexica','meigen','promptseen','geminiprompt','promptsnap','github','builtin'].map(function(s){var label=s==='all'?'All':s==='builtin'?'Built-in':s==='meigen'?'Meigen':s==='promptseen'?'PromptSeen':s==='geminiprompt'?'GeminiPrompt':s==='promptsnap'?'PromptSnap':s.charAt(0).toUpperCase()+s.slice(1);return'<div class="chip '+(S.src===s?'act':'')+'" onclick="S.src=\''+s+'\';render()" style="font-size:9px;padding:4px 8px">'+label+'</div>'}).join('');
return'<div class="anim-up"><section style="padding:14px"><div style="margin-bottom:12px"><h2 style="font-size:16px;font-weight:700">Explore</h2><p style="font-size:10px;color:var(--muted)">'+f.length+' prompts</p></div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">'+srcChips+'</div><div class="chips" style="margin-bottom:8px">'+CATS.map(function(c){return'<div class="chip '+(S.cat===c.id?'act':'')+'" onclick="S.cat=\''+c.id+'\';render()">'+c.n+'</div>'}).join('')+'</div></section><section style="padding:0 14px 24px"><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">'+(f.length?f.map(function(p,i){return cardHTML(p,i)}).join(''):'<div class="empty" style="grid-column:span 2"><i class="fas fa-wand-magic-sparkles"></i><p>No prompts match your filters</p><button onclick="S.src=\'all\';S.cat=\'all\';render()" class="btn btn-p" style="margin-top:10px;font-size:11px">Clear Filters</button></div>')+'</div></section></div>'}

function renderSearch(){return'<div class="anim-up"><section style="padding:14px"><h2 style="font-size:16px;font-weight:700;margin-bottom:12px">Search</h2><div class="search-box" style="margin-bottom:10px"><i class="fas fa-magnifying-glass ico"></i><input type="text" id="searchIn" placeholder="Search prompts..." value="'+esc(S.q)+'" onkeydown="if(event.key===\'Enter\')doSearch()"></div><button onclick="doSearch()" class="btn btn-p" style="width:100%"><i class="fas fa-magnifying-glass"></i> Search</button></section><section style="padding:0 14px">'+(S.q?'<p style="font-size:11px;color:var(--muted);margin-bottom:10px">'+getFiltered().length+' results for "'+esc(S.q)+'"</p><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px">'+(getFiltered().length?getFiltered().slice(0,30).map(function(p,i){return cardHTML(p,i)}).join(''):'<div class="empty" style="grid-column:span 2"><i class="fas fa-magnifying-glass"></i><p>No results</p></div>')+'</div>':'<p style="font-size:12px;font-weight:600;margin-bottom:10px">Popular Searches</p><div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:20px">'+['anime girl','landscape','cyberpunk','portrait','fantasy','dragon','space','robot','sunset','underwater','steampunk','forest','castle','neon city','cat warrior'].map(function(q){return'<div class="chip" onclick="S.q=\''+q+'\';doSearch()">'+q+'</div>'}).join('')+'</div>')+'</section></div>'}

function renderSaved(){return'<div class="anim-up"><section style="padding:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div><h2 style="font-size:16px;font-weight:700">Saved</h2><p style="font-size:10px;color:var(--muted)">'+S.saved.length+' saved</p></div>'+(S.saved.length?'<button onclick="if(confirm(\'Clear all?\')){S.saved=[];localStorage.setItem(\'pv_s\',\'[]\');document.getElementById(\'saveDot\').style.display=\'none\';render();toast(\'Cleared\',\'fa-trash\')}" class="btn btn-s btn-sm" style="color:var(--danger);border-color:rgba(244,63,94,.3)"><i class="fas fa-trash"></i></button>':'')+'</div></section><section style="padding:0 14px 24px">'+(S.saved.length?S.saved.map(function(p,i){return'<div onclick="openDetail(S.saved['+i+'])" style="display:flex;gap:10px;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;cursor:pointer;margin-bottom:6px">'+(p.img?'<img src="'+p.img+'" style="width:50px;height:50px;border-radius:9px;object-fit:cover;flex-shrink:0" onerror="this.style.display=\'none\'">':'<div style="width:50px;height:50px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-wand-magic-sparkles" style="color:var(--muted)"></i></div>')+'<div style="flex:1;min-width:0"><p style="font-size:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5">'+esc(p.prompt.substring(0,120))+'</p><span style="font-size:9px;color:var(--accent)">'+(p.src||'Built-in')+'</span></div><button onclick="event.stopPropagation();toggleSave(S.saved['+i+'])" style="background:none;border:none;color:var(--accent3);cursor:pointer;font-size:13px;padding:4px;align-self:flex-start"><i class="fas fa-bookmark"></i></button></div>'}).join(''):'<div class="empty"><i class="fas fa-bookmark"></i><p style="font-size:14px;font-weight:600;margin-bottom:4px">No saved prompts</p><button onclick="go(\'explore\')" class="btn btn-p" style="margin-top:14px;font-size:11px"><i class="fas fa-compass"></i> Explore</button></div>')+'</section></div>'}

function cardHTML(p,idx){var sv=isSaved(p.id);var hasImg=p.img&&!S.imgErr[p.id];
return'<div class="card anim-up" style="animation-delay:'+Math.min(idx*40,500)+'ms" onclick="openDetail(findP(\''+p.id.replace(/'/g,'\\')+'\'))">'+(hasImg?'<div style="position:relative;overflow:hidden"><img src="'+p.img+'" class="card-img" loading="lazy" onerror="this.style.display=\'none\';S.imgErr[\''+p.id+'\']=true;this.nextElementSibling.style.display=\'flex\'"><div style="display:none;aspect-ratio:1/1;background:var(--bg3);align-items:center;justify-content:center"><i class="fas fa-image" style="color:var(--muted);font-size:20px"></i></div><div class="card-ov"><p>'+esc(p.prompt.substring(0,100))+'</p></div></div>':'<div style="aspect-ratio:1/1;background:var(--bg3);display:flex;align-items:center;justify-content:center;position:relative;padding:10px"><i class="fas fa-wand-magic-sparkles" style="font-size:24px;opacity:.15;position:absolute"></i><p style="font-size:10px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:7;-webkit-box-orient:vertical;overflow:hidden;position:relative">'+esc(p.prompt.substring(0,250))+'</p></div>')+'<div class="card-foot"><span class="card-src">'+(p.src||'Built-in')+'</span><button onclick="event.stopPropagation();toggleSave(findP(\''+p.id.replace(/'/g,'\\')+'\'))" class="card-save '+(sv?'saved':'')+'" style="color:'+(sv?'var(--accent3)':'var(--muted)')+'"><i class="fas fa-bookmark"></i></button></div></div>'}

// ============ NAV ============
function go(view){S.view=view;document.querySelectorAll('.bnav-item').forEach(function(el){el.classList.toggle('act',el.dataset.v===view)});render();document.getElementById('mc').scrollTop=0}
function doSearch(){var inp=document.getElementById('searchIn');S.q=inp?inp.value.trim():S.q;render()}

// ============ AMBIENT ============
(function(){var c=document.createElement('div');c.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden';document.body.insertBefore(c,document.body.firstChild);['rgba(6,214,160,.03)','rgba(124,58,237,.03)','rgba(6,182,212,.025)'].forEach(function(col,i){var o=document.createElement('div');var sz=200+Math.random()*250;o.style.cssText='position:absolute;width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+col+';filter:blur(70px);left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;animation:float '+(5+Math.random()*4)+'s ease-in-out infinite;animation-delay:'+(i*1.5)+'s';c.appendChild(o)})})();

// ============ INIT ============
document.getElementById('saveDot').style.display=S.saved.length?'block':'none';
loadAllSources(false);
</script>
</body>
</html>
