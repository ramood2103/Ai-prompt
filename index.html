<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PromptVerse — AI Prompt Browser</title>
    <meta name="theme-color" content="#0b0b12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'space': ['Space Grotesk', 'sans-serif'] },
                    colors: {
                        dark: { 900: '#0b0b12', 800: '#111120', 700: '#181830', 600: '#1f1f40', 500: '#2a2a50' },
                        accent: { DEFAULT: '#06d6a0', light: '#34efbf', dark: '#04a87e' },
                        violet: { DEFAULT: '#7c3aed', light: '#a78bfa' }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg: #0b0b12;
            --bg2: #111120;
            --bg3: #181830;
            --bg4: #1f1f40;
            --accent: #06d6a0;
            --accent2: #7c3aed;
            --text: #f0f0f5;
            --muted: #7a7a9a;
            --border: #2a2a4a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { overflow: hidden; height: 100%; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* App shell */
        .app-shell {
            display: flex; flex-direction: column;
            height: 100vh; height: 100dvh;
            max-width: 480px; margin: 0 auto;
            position: relative; overflow: hidden;
        }

        /* Header */
        .app-header {
            background: rgba(11,11,18,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(42,42,74,0.4);
            z-index: 50;
            padding: 12px 16px;
            flex-shrink: 0;
        }

        /* Main content */
        .app-content {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* Bottom nav */
        .bottom-nav {
            background: rgba(11,11,18,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(42,42,74,0.4);
            display: flex; justify-content: space-around; align-items: center;
            padding: 8px 0 env(safe-area-inset-bottom, 8px);
            flex-shrink: 0; z-index: 50;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            padding: 6px 16px; border-radius: 12px; cursor: pointer;
            transition: all 0.25s ease; color: var(--muted);
            font-size: 10px; font-weight: 500;
        }
        .nav-item i { font-size: 20px; transition: transform 0.25s ease; }
        .nav-item.active { color: var(--accent); }
        .nav-item.active i { transform: scale(1.15); }
        .nav-item:hover { color: var(--accent); }

        /* Prompt cards */
        .prompt-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .prompt-card:hover { border-color: rgba(6,214,160,0.3); transform: translateY(-2px); }
        .prompt-card:active { transform: scale(0.97); }

        .prompt-card .card-img {
            width: 100%; aspect-ratio: 1/1;
            object-fit: cover; display: block;
            background: var(--bg3);
            transition: opacity 0.4s ease;
        }
        .prompt-card .card-img.loaded {  }
        .prompt-card .card-img:not([src]) { opacity: 0; }

        .card-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            padding: 40px 10px 10px;
        }

        .card-source-badge {
            position: absolute; top: 8px; right: 8px;
            background: rgba(6,214,160,0.2); color: var(--accent);
            font-size: 9px; font-weight: 600; padding: 3px 8px;
            border-radius: 6px; border: 1px solid rgba(6,214,160,0.3);
        }

        /* Category chips */
        .chip {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 14px; border-radius: 20px;
            font-size: 12px; font-weight: 500;
            background: var(--bg3); color: var(--muted);
            border: 1px solid transparent;
            cursor: pointer; transition: all 0.2s ease;
            white-space: nowrap; flex-shrink: 0;
        }
        .chip:hover { border-color: var(--border); color: var(--text); }
        .chip.active {
            background: rgba(6,214,160,0.15); color: var(--accent);
            border-color: rgba(6,214,160,0.4);
        }

        /* Detail modal */
        .detail-modal {
            position: fixed; inset: 0; z-index: 100;
            background: var(--bg);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 480px; margin: 0 auto;
            overflow-y: auto; overflow-x: hidden;
        }
        .detail-modal.open { transform: translateY(0); }

        .detail-img {
            width: 100%; max-height: 400px;
            object-fit: contain; background: var(--bg2);
        }

        .prompt-text-box {
            background: var(--bg3); border: 1px solid var(--border);
            border-radius: 12px; padding: 14px;
            font-size: 13px; line-height: 1.7;
            color: #c8c8e0; position: relative;
            word-break: break-word;
        }

        .param-tag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 10px; border-radius: 8px;
            background: var(--bg3); border: 1px solid var(--border);
            font-size: 11px; color: var(--muted);
        }

        /* Action buttons */
        .action-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            padding: 10px 18px; border-radius: 12px;
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease;
            border: none; outline: none;
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn.primary {
            background: var(--accent); color: #0b0b12;
        }
        .action-btn.primary:hover { background: var(--accent); filter: brightness(1.1); }
        .action-btn.secondary {
            background: var(--bg3); color: var(--text);
            border: 1px solid var(--border);
        }
        .action-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }

        /* Toast */
        .toast-container {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            z-index: 200; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .toast {
            background: var(--bg4); color: var(--text);
            padding: 10px 20px; border-radius: 12px;
            font-size: 13px; font-weight: 500;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
            display: flex; align-items: center; gap: 8px;
        }

        /* Source selector */
        .source-tab {
            padding: 8px 16px; border-radius: 10px;
            font-size: 12px; font-weight: 600;
            background: transparent; color: var(--muted);
            cursor: pointer; transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .source-tab.active {
            background: rgba(6,214,160,0.12); color: var(--accent);
            border-color: rgba(6,214,160,0.3);
        }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }

        /* Glow effects */
        .glow-accent {
            box-shadow: 0 0 30px rgba(6,214,160,0.15), 0 0 60px rgba(6,214,160,0.05);
        }

        /* Animations */
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            80%, 100% { transform: scale(1.3); opacity: 0; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes bgShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .animate-fade { animation: fadeIn 0.4s ease; }
        .animate-slide { animation: slideUp 0.5s ease; }
        .animate-float { animation: float 3s ease-in-out infinite; }

        /* Hero gradient */
        .hero-gradient {
            background: linear-gradient(135deg, rgba(6,214,160,0.08), rgba(124,58,237,0.08), rgba(6,214,160,0.04));
            background-size: 300% 300%;
            animation: bgShift 8s ease infinite;
        }

        /* Search input */
        .search-input {
            width: 100%; padding: 12px 16px 12px 42px;
            background: var(--bg3); border: 1px solid var(--border);
            border-radius: 14px; color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px; outline: none;
            transition: border-color 0.2s ease;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--muted); }

        /* Responsive - wider screens */
        @media (min-width: 481px) {
            .app-shell {
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
            }
        }

        /* Loading spinner */
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty state */
        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 60px 20px;
            text-align: center; color: var(--muted);
        }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }

        /* Save bookmark animation */
        .bookmark-btn.saved { color: #f59e0b !important; }
        .bookmark-btn.saved i { animation: pulse-ring 0.4s ease; }

        /* Image loading placeholder */
        .img-placeholder {
            background: var(--bg3);
            display: flex; align-items: center; justify-content: center;
            color: var(--muted); font-size: 24px;
        }

        /* Notification dot */
        .notif-dot {
            width: 6px; height: 6px; background: var(--accent);
            border-radius: 50%; position: absolute;
            top: 4px; right: 12px;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

                </div>
                <div class="flex items-center gap-2">
                    <button onclick="showSourceSelector()" class="w-9 h-9 rounded-xl flex items-center justify-center" style="background: var(--bg3); border: 1px solid var(--border); color: var(--muted); cursor: pointer;" aria-label="Source selector">

            <div class="nav-item" data-view="saved" onclick="switchView('saved')" role="button" tabindex="0" aria-label="Saved">

                        <i class="fas fa-circle-info" style="color: var(--accent);"></i>
                        PromptVerse fetches prompts from free public APIs and websites. If a source is unreachable, it falls back to the built-in library. Data is cached for performance.

    // ==========================================
    // CORS PROXY + FETCH UTILITY
    // ==========================================
    const PROXY_LIST = [
        url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
        url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
    ];

    async function smartFetch(url, timeout = 12000) {
        // Try direct fetch first
        try {
            const controller = new AbortController();
            const tid = setTimeout(() => controller.abort(), timeout);
            const res = await fetch(url, { signal: controller.signal });
            clearTimeout(tid);
            if (res.ok) {
                const text = await res.text();
                try { return JSON.parse(text); } catch { return text; }
            }
        } catch(e) { /* CORS or network error, try proxies */ }

        // Try each CORS proxy
        for (const proxyFn of PROXY_LIST) {
            try {
                const proxyUrl = proxyFn(url);
                const controller = new AbortController();
                const tid = setTimeout(() => controller.abort(), timeout);
                const res = await fetch(proxyUrl, { signal: controller.signal });
                clearTimeout(tid);
                if (res.ok) {
                    const text = await res.text();
                    try { return JSON.parse(text); } catch { return text; }
                }
            } catch(e) { continue; }
        }

        throw new Error('All fetch methods failed for: ' + url);
    }

    // ==========================================
    // API SOURCES
    // ==========================================
    const SOURCES = {
        civitai: {
            name: 'Civitai',
            icon: 'fa-fire',
            desc: 'Community AI art platform with prompts & models',
            color: '#06d6a0',
            async fetch(page = 1, sort = 'Most Reactions', tag = '') {
                const params = new URLSearchParams({ limit: 24, page, sort, nsfw: 'false', 'projectId': '' });
                if (tag && tag !== 'all') params.set('tags', tag);
                const url = `https://civitai.com/api/v1/images?${params}`;
                const data = await smartFetch(url);
                if (!data || !data.items) throw new Error('Invalid Civitai response');
                return {
                    items: data.items.filter(i => i.meta && i.meta.prompt).map(i => ({
                        id: `civ-${i.id}`,
                        imageUrl: i.url,
                        prompt: i.meta.prompt || '',
                        negativePrompt: i.meta.negativePrompt || '',
                        model: i.meta.Model || 'Unknown',
                        steps: i.meta.steps || 0,
                        cfgScale: i.meta.cfgScale || 0,
                        sampler: i.meta.sampler || '',
                        seed: i.meta.seed || 0,
                        tags: i.tags || [],
                        likes: (i.stats && i.stats.likeCount) || 0,
                        source: 'Civitai',
                        width: i.width || 512,
                        height: i.height || 512
                    })),
                    nextPage: data.metadata?.nextPage ? page + 1 : null,
                    total: data.metadata?.totalItems || 0
                };
            }
        },
        lexica: {
            name: 'Lexica',
            icon: 'fa-search',
            desc: 'Stable Diffusion search engine with millions of prompts',
            color: '#7c3aed',
            async fetch(query = '', page = 1) {
                const url = query
                    ? `https://lexica.art/api/v1/search?q=${encodeURIComponent(query)}`
                    : `https://lexica.art/api/v1/search?q=art`;
                const data = await smartFetch(url);
                if (!data || !data.images) throw new Error('Invalid Lexica response');
                return {
                    items: data.images.map(i => ({
                        id: `lex-${i.id}`,
                        imageUrl: i.srcSmall || i.src,
                        prompt: i.prompt || '',
                        negativePrompt: '',
                        model: 'Stable Diffusion',
                        steps: 0, cfgScale: 0, sampler: '', seed: i.seed || 0,
                        tags: [],
                        likes: 0,
                        source: 'Lexica',
                        width: i.width || 512,
                        height: i.height || 512
                    })),
                    nextPage: null,
                    total: data.images.length
                };
            }
        },
        meigen: {
            name: 'Meigen AI',
            icon: 'fa-language',
            desc: 'Asian AI prompt library with curated collections',
            color: '#f59e0b',
            async fetch(page = 1) {
                const url = `https://www.meigen.ai/`;
                const html = await smartFetch(url);
                if (typeof html !== 'string') throw new Error('Invalid meigen response');
                // Try to parse prompts from HTML
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const items = [];

                // Try common selectors for prompt content
                const promptElements = doc.querySelectorAll('[class*="prompt"], [class*="card"], [class*="item"], article, .gallery-item');
                promptElements.forEach((el, idx) => {
                    const text = el.textContent.trim();
                    if (text && text.length > 20 && text.length < 2000) {
                        const img = el.querySelector('img');
                        items.push({
                            id: `mei-${idx}`,
                            imageUrl: img ? img.src : '',
                            prompt: text.substring(0, 500),
                            negativePrompt: '',
                            model: 'Various',
                            steps: 0, cfgScale: 0, sampler: '', seed: 0,
                            tags: [],
                            likes: 0,
                            source: 'Meigen AI',
                            width: 512, height: 512
                        });
                    }
                });

                if (items.length === 0) throw new Error('Could not parse meigen.ai content');
                return { items, nextPage: null, total: items.length };
            }
        },
        builtin: {
            name: 'Built-in Library',
            icon: 'fa-book',
            desc: 'Curated collection of 30 high-quality prompts, always available',
            color: '#ec4899',
            async fetch(page = 1, sort = '', tag = 'all') {

        return State.savedPrompts.some(p => p.id === id);

    function toggleSave(prompt) {
        if (isSaved(prompt.id)) {
            State.savedPrompts = State.savedPrompts.filter(p => p.id !== prompt.id);
            showToast('Removed from saved', 'fa-bookmark');
        } else {
            State.savedPrompts.unshift({...prompt});
            showToast('Saved to collection', 'fa-bookmark');
        }
        localStorage.setItem('pv_saved', JSON.stringify(State.savedPrompts));
        updateSavedNotif();
        // Re-render current view

    // ==========================================
    // COPY TO CLIPBOARD
    // ==========================================
    async function copyPrompt(text) {
        try {
            await navigator.clipboard.writeText(text);
            showToast('Prompt copied to clipboard', 'fa-copy');
        } catch {
            // Fallback
            const ta = document.createElement('textarea');
            ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta); ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('Prompt copied', 'fa-copy');
        }
    }

        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

        State.currentSource = key;
        State.prompts = [];
        State.currentPage = 1;

        closeSourceSelector();
        showToast(`Switched to ${SOURCES[key].name}`, 'fa-database');
        await loadPrompts();
        renderCurrentView();

    // ==========================================
    // LOAD PROMPTS FROM SOURCE
    // ==========================================
    async function loadPrompts(append = false) {
        if (State.loading) return;
        State.loading = true;

        const source = SOURCES[State.currentSource];
        try {
            let result;
            if (State.currentSource === 'civitai') {
                const sortMap = { trending: 'Most Reactions', newest: 'Newest', most_comments: 'Most Comments' };
                const sort = sortMap[State.sortBy] || 'Most Reactions';
                const tag = State.currentCategory !== 'all' ? State.currentCategory : '';
                result = await source.fetch(State.currentPage, sort, tag);
            } else if (State.currentSource === 'lexica') {
                result = await source.fetch(State.searchQuery || 'art', State.currentPage);
            } else if (State.currentSource === 'meigen') {
                result = await source.fetch(State.currentPage);
            } else {
                result = await source.fetch(State.currentPage, '', State.currentCategory);
            }

            if (append) {
                State.prompts = [...State.prompts, ...result.items];
            } else {
                State.prompts = result.items;
            }
            State.hasMore = result.nextPage !== null;
        } catch(e) {
            console.warn('Source fetch failed, falling back to built-in:', e.message);
            if (!append) {
                // Fallback to built-in
                const fallback = await SOURCES.builtin.fetch(1, '', State.currentCategory);
                State.prompts = fallback.items;
                State.hasMore = false;
                if (State.currentSource !== 'builtin') {
                    showToast('Using built-in library (source unavailable)', 'fa-triangle-exclamation');
                }
            }
        }

        State.loading = false;
    }

                    <div style="position: relative; overflow: hidden;">
                        <img src="${imgSrc}" alt="AI art" class="card-img" loading="lazy"
                            onerror="this.style.display='none'; State.imageErrors.add('${prompt.id}'); this.nextElementSibling.style.display='flex';"
                        >
                        <div class="img-placeholder" style="display:none; aspect-ratio: 1/1;">
                            <i class="fas fa-image"></i>
                        </div>
                        <div class="card-overlay">
                            <p style="font-size: 11px; color: rgba(255,255,255,0.9); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis;">
                                ${escapeHtml(prompt.prompt.substring(0, 120))}${prompt.prompt.length > 120 ? '...' : ''}
                            </p>
                        </div>
                    </div>
                ` : `
                    <div class="img-placeholder" style="aspect-ratio: 1/1; position: relative;">
                        <i class="fas fa-wand-magic-sparkles" style="font-size: 32px; opacity: 0.2;"></i>
                        <div class="card-overlay">
                            <p style="font-size: 11px; color: rgba(255,255,255,0.9); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden;">
                                ${escapeHtml(prompt.prompt.substring(0, 200))}${prompt.prompt.length > 200 ? '...' : ''}
                            </p>
                        </div>
                    </div>
                `}
                <div style="padding: 10px;">
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <span style="font-size: 10px; color: var(--muted); background: var(--bg3); padding: 2px 8px; border-radius: 6px;">
                            ${escapeHtml(prompt.source || 'Built-in')}
                        </span>
                        <button class="bookmark-btn ${saved ? 'saved' : ''}" onclick="event.stopPropagation(); toggleSave(State.prompts[${State.prompts.indexOf(prompt)}] || State.savedPrompts.find(p=>p.id==='${prompt.id}'))" style="background: none; border: none; color: ${saved ? '#f59e0b' : 'var(--muted)'}; cursor: pointer; font-size: 14px; padding: 4px;" aria-label="${saved ? 'Unsave' : 'Save'}">
                            <i class="fas fa-bookmark"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;
    }

    function createLoadingSkeleton(count = 6) {
        return Array(count).fill('').map(() => `
            <div class="prompt-card">
                <div class="skeleton" style="aspect-ratio: 1/1;"></div>
                <div style="padding: 10px;">
                    <div class="skeleton" style="height: 12px; width: 60%; margin-bottom: 6px;"></div>
                    <div class="skeleton" style="height: 10px; width: 40%;"></div>
                </div>
            </div>
        `).join('');
    }

    // ==========================================
    // VIEW RENDERERS
    // ==========================================
    function renderHome() {
        const featured = State.prompts.length > 0 ? State.prompts[0] : null;
        const trending = State.prompts.slice(1, 13);
        const recentSaved = State.savedPrompts.slice(0, 4);

        return `
            <div class="animate-fade">
                <!-- Hero section -->
                <section class="hero-gradient" style="padding: 24px 16px 20px;">
                    <p style="font-size: 13px; color: var(--accent); font-weight: 600; margin-bottom: 4px;">Welcome to PromptVerse</p>
                    <h2 style="font-size: 24px; font-weight: 800; line-height: 1.2; margin-bottom: 8px;">
                        Discover Perfect<br>AI Image Prompts
                    </h2>
                    <p style="font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 16px;">
                        Browse thousands of prompts from Civitai, Lexica, and more. Copy, save, and create stunning AI art.
                    </p>
                    <div onclick="switchView('search')" style="display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; cursor: pointer;">
                        <i class="fas fa-magnifying-glass" style="color: var(--muted); font-size: 14px;"></i>
                        <span style="color: var(--muted); font-size: 14px;">Search prompts...</span>
                    </div>
                </section>

                <!-- Quick categories -->
                <section style="padding: 0 16px 16px;">
                    <div style="display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; -ms-overflow-style: none; scrollbar-width: none;" class="hide-scrollbar">
                        ${CATEGORIES.slice(0, 8).map(cat => `
                            <div class="chip" onclick="exploreCategory('${cat.id}')">
                                <i class="fas ${cat.icon}" style="font-size: 10px;"></i>
                                ${cat.name}
                            </div>
                        `).join('')}
                    </div>
                </section>

                <!-- Featured prompt -->
                ${featured ? `
                <section style="padding: 0 16px 20px;">
                    <h3 style="font-size: 16px; font-weight: 700; margin-bottom: 12px;">Featured</h3>
                    <div onclick="openDetail(State.prompts[0])" style="
                        background: var(--bg2); border: 1px solid var(--border); border-radius: 18px;
                        overflow: hidden; cursor: pointer; transition: all 0.3s ease;
                    " onmouseover="this.style.borderColor='rgba(6,214,160,0.3)'" onmouseout="this.style.borderColor='var(--border)'">
                        ${featured.imageUrl ? `
                            <img src="${featured.imageUrl}" alt="Featured" style="width: 100%; height: 200px; object-fit: cover;" loading="lazy" onerror="this.style.display='none'">
                        ` : ''}
                        <div style="padding: 14px;">
                            <p style="font-size: 13px; color: var(--text); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                                ${escapeHtml(featured.prompt.substring(0, 150))}
                            </p>
                            <div style="display: flex; align-items: center; gap: 8px; margin-top: 10px;">
                                <span style="font-size: 10px; color: var(--accent); background: rgba(6,214,160,0.1); padding: 3px 8px; border-radius: 6px;">${featured.source}</span>
                                ${featured.model ? `<span style="font-size: 10px; color: var(--muted);">${escapeHtml(featured.model)}</span>` : ''}
                            </div>
                        </div>
                    </div>
                </section>
                ` : ''}

                <!-- Trending -->
                <section style="padding: 0 16px 20px;">
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
                        <h3 style="font-size: 16px; font-weight: 700;">Trending</h3>
                        <span onclick="switchView('explore')" style="font-size: 12px; color: var(--accent); cursor: pointer; font-weight: 500;">See all <i class="fas fa-chevron-right" style="font-size: 10px;"></i></span>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                        ${State.loading ? createLoadingSkeleton(4) :
                          trending.length > 0 ? trending.map((p, i) => createPromptCard(p, i)).join('') :
                          `<div class="empty-state" style="grid-column: span 2;"><i class="fas fa-wand-magic-sparkles"></i><p>No prompts loaded yet</p></div>`
                        }
                    </div>
                </section>

                <!-- Recent saved -->
                ${recentSaved.length > 0 ? `
                <section style="padding: 0 16px 24px;">
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
                        <h3 style="font-size: 16px; font-weight: 700;">Recently Saved</h3>
                        <span onclick="switchView('saved')" style="font-size: 12px; color: var(--accent); cursor: pointer; font-weight: 500;">View all <i class="fas fa-chevron-right" style="font-size: 10px;"></i></span>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        ${recentSaved.map(p => `
                            <div onclick="openDetail(State.savedPrompts.find(sp=>sp.id==='${p.id}'))" style="
                                display: flex; align-items: center; gap: 12px;
                                padding: 10px 14px; background: var(--bg2);
                                border: 1px solid var(--border); border-radius: 14px;
                                cursor: pointer; transition: all 0.2s ease;
                            " onmouseover="this.style.borderColor='rgba(6,214,160,0.3)'" onmouseout="this.style.borderColor='var(--border)'">
                                ${p.imageUrl ? `<img src="${p.imageUrl}" style="width: 44px; height: 44px; border-radius: 10px; object-fit: cover; flex-shrink: 0;" onerror="this.style.display='none'">` : `<div style="width: 44px; height: 44px; border-radius: 10px; background: var(--bg3); display: flex; align-items: center; justify-content: center; flex-shrink: 0;"><i class="fas fa-wand-magic-sparkles" style="color: var(--muted); font-size: 14px;"></i></div>`}
                                <p style="font-size: 12px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(p.prompt.substring(0, 60))}</p>
                                <i class="fas fa-chevron-right" style="color: var(--muted); font-size: 10px;"></i>
                            </div>
                        `).join('')}
                    </div>
                </section>
                ` : ''}
            </div>
        `;
    }

    function renderExplore() {
        const sourceInfo = SOURCES[State.currentSource];
        return `
            <div class="animate-fade">
                <!-- Source info -->
                <section style="padding: 16px 16px 12px;">
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div style="width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: ${sourceInfo.color}22; color: ${sourceInfo.color};">
                                <i class="fas ${sourceInfo.icon}"></i>
                            </div>
                            <div>
                                <h2 style="font-size: 16px; font-weight: 700;">${sourceInfo.name}</h2>
                                <p style="font-size: 11px; color: var(--muted);">${State.prompts.length} prompts loaded</p>
                            </div>
                        </div>
                        <button onclick="loadPrompts().then(renderCurrentView)" class="action-btn secondary" style="padding: 6px 12px; font-size: 11px;">
                            <i class="fas fa-arrows-rotate ${State.loading ? 'fa-spin' : ''}"></i> Refresh
                        </button>
                    </div>

                    <!-- Sort options -->
                    <div style="display: flex; gap: 6px; margin-bottom: 12px;">
                        ${['trending', 'newest'].map(sort => `
                            <div class="chip ${State.sortBy === sort ? 'active' : ''}" onclick="changeSort('${sort}')">
                                <i class="fas ${sort === 'trending' ? 'fa-fire' : 'fa-clock'}"></i>
                                ${sort.charAt(0).toUpperCase() + sort.slice(1)}
                            </div>
                        `).join('')}
                    </div>

                    <!-- Category chips -->
                    <div style="display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; -ms-overflow-style: none; scrollbar-width: none;">
                        ${CATEGORIES.map(cat => `
                            <div class="chip ${State.currentCategory === cat.id ? 'active' : ''}" onclick="changeCategory('${cat.id}')">
                                ${cat.name}
                            </div>
                        `).join('')}
                    </div>
                </section>

                <!-- Prompt grid -->
                <section style="padding: 0 16px 24px;">
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;" id="exploreGrid">
                        ${State.loading ? createLoadingSkeleton(6) :
                          State.prompts.length > 0 ? State.prompts.map((p, i) => createPromptCard(p, i)).join('') :
                          `<div class="empty-state" style="grid-column: span 2;">
                              <i class="fas fa-wand-magic-sparkles"></i>
                              <p style="margin-bottom: 12px;">No prompts found</p>
                              <button onclick="loadPrompts().then(renderCurrentView)" class="action-btn primary" style="font-size: 12px;">Try Again</button>
                          </div>`
                        }
                    </div>

                    <!-- Load more -->
                    ${State.hasMore && !State.loading && State.prompts.length > 0 ? `
                        <div style="text-align: center; margin-top: 20px;">
                            <button onclick="loadMore()" class="action-btn secondary">
                                <i class="fas fa-plus"></i> Load More
                            </button>
                        </div>
                    ` : ''}
                </section>
            </div>
        `;
    }

    function renderSearch() {
        return `
            <div class="animate-fade">
                <section style="padding: 16px;">
                    <h2 style="font-size: 18px; font-weight: 700; margin-bottom: 14px;">Search Prompts</h2>
                    <div style="position: relative; margin-bottom: 16px;">
                        <i class="fas fa-magnifying-glass" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px;"></i>
                        <input type="text" class="search-input" id="searchInput" placeholder="Describe what you want to create..."
                            value="${escapeHtml(State.searchQuery)}" onkeydown="if(event.key==='Enter')doSearch()" autofocus>
                        ${State.searchQuery ? `<button onclick="clearSearch()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer;"><i class="fas fa-xmark"></i></button>` : ''}
                    </div>
                    <button onclick="doSearch()" class="action-btn primary" style="width: 100%; margin-bottom: 16px;">
                        <i class="fas fa-magnifying-glass"></i> Search
                    </button>
                </section>

                <!-- Search results -->
                <section style="padding: 0 16px 24px;">
                    ${State.searchQuery && State.prompts.length > 0 ? `
                        <p style="font-size: 12px; color: var(--muted); margin-bottom: 12px;">Results for "${escapeHtml(State.searchQuery)}"</p>
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                            ${State.prompts.map((p, i) => createPromptCard(p, i)).join('')}
                        </div>
                    ` : State.searchQuery && !State.loading ? `
                        <div class="empty-state">
                            <i class="fas fa-magnifying-glass"></i>
                            <p>No results found for "${escapeHtml(State.searchQuery)}"</p>
                            <p style="font-size: 12px; margin-top: 4px;">Try different keywords or sources</p>
                        </div>
                    ` : !State.searchQuery ? `
                        <!-- Popular searches -->
                        <div>
                            <p style="font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text);">Popular Searches</p>
                            <div style="display: flex; flex-wrap: wrap; gap: 6px;">
                                ${['anime girl', 'landscape', 'cyberpunk', 'portrait', 'fantasy art', 'cat', 'space', 'dragon', 'flowers', 'architecture', 'robot', 'sunset'].map(q => `
                                    <div class="chip" onclick="quickSearch('${q}')">${q}</div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                </section>
            </div>
        `;
    }

    function renderSaved() {
        return `
            <div class="animate-fade">
                <section style="padding: 16px;">
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
                        <div>
                            <h2 style="font-size: 18px; font-weight: 700;">Saved Prompts</h2>
                            <p style="font-size: 12px; color: var(--muted);">${State.savedPrompts.length} prompt${State.savedPrompts.length !== 1 ? 's' : ''} saved</p>
                        </div>
                        ${State.savedPrompts.length > 0 ? `
                            <button onclick="clearAllSaved()" class="action-btn secondary" style="padding: 6px 12px; font-size: 11px; color: #f43f5e; border-color: rgba(244,63,94,0.3);">
                                <i class="fas fa-trash"></i> Clear All
                            </button>
                        ` : ''}
                    </div>
                </section>

                <section style="padding: 0 16px 24px;">
                    ${State.savedPrompts.length > 0 ? `
                        <div style="display: flex; flex-direction: column; gap: 10px;">
                            ${State.savedPrompts.map((p, i) => `
                                <div onclick="openDetail(State.savedPrompts[${i}])" class="animate-slide" style="animation-delay: ${i * 40}ms; display: flex; gap: 12px; padding: 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; cursor: pointer; transition: all 0.2s ease;" onmouseover="this.style.borderColor='rgba(6,214,160,0.3)'" onmouseout="this.style.borderColor='var(--border)'">
                                    ${p.imageUrl ? `<img src="${p.imageUrl}" style="width: 56px; height: 56px; border-radius: 10px; object-fit: cover; flex-shrink: 0;" onerror="this.style.display='none'">` : `<div style="width: 56px; height: 56px; border-radius: 10px; background: var(--bg3); display: flex; align-items: center; justify-content: center; flex-shrink: 0;"><i class="fas fa-wand-magic-sparkles" style="color: var(--muted);"></i></div>`}
                                    <div style="flex: 1; min-width: 0;">
                                        <p style="font-size: 12px; color: var(--text); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${escapeHtml(p.prompt.substring(0, 120))}</p>
                                        <div style="display: flex; align-items: center; gap: 6px; margin-top: 6px;">
                                            <span style="font-size: 10px; color: var(--accent);">${p.source || 'Built-in'}</span>
                                            ${p.model ? `<span style="font-size: 10px; color: var(--muted);">· ${escapeHtml(p.model)}</span>` : ''}
                                        </div>
                                    </div>
                                    <button onclick="event.stopPropagation(); toggleSave(State.savedPrompts[${i}])" style="background: none; border: none; color: #f59e0b; cursor: pointer; padding: 4px; font-size: 14px; align-self: flex-start;" aria-label="Remove from saved">
                                        <i class="fas fa-bookmark"></i>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    ` : `
                        <div class="empty-state">
                            <i class="fas fa-bookmark"></i>
                            <p style="font-size: 15px; font-weight: 600; margin-bottom: 4px;">No saved prompts yet</p>
                            <p style="font-size: 12px;">Browse and save prompts you love</p>
                            <button onclick="switchView('explore')" class="action-btn primary" style="margin-top: 16px; font-size: 12px;">
                                <i class="fas fa-compass"></i> Explore Prompts
                            </button>
                        </div>
                    `}
                </section>
            </div>
        `;
    }

    // ==========================================
    // VIEW SWITCHING
    // ==========================================
    function switchView(view) {
        State.currentView = view;

        // Update nav
        document.querySelectorAll('.nav-item').forEach(el => {
            el.classList.toggle('active', el.dataset.view === view);
        });

        renderCurrentView();
        document.getElementById('mainContent').scrollTop = 0;
    }

    function renderCurrentView() {
        const main = document.getElementById('mainContent');
        switch(State.currentView) {
            case 'home': main.innerHTML = renderHome(); break;
            case 'explore': main.innerHTML = renderExplore(); break;
            case 'search': main.innerHTML = renderSearch(); break;
            case 'saved': main.innerHTML = renderSaved(); break;
        }
    }

    // ==========================================
    // ACTIONS
    // ==========================================
    async function doSearch() {
        const input = document.getElementById('searchInput');
        const query = input ? input.value.trim() : State.searchQuery;
        if (!query) return;

        State.searchQuery = query;
        State.prompts = [];
        State.loading = true;
        renderCurrentView();

        // Use Lexica for search (better search capability)
        const prevSource = State.currentSource;
        State.currentSource = 'lexica';

        await loadPrompts();
        State.currentSource = prevSource;
        renderCurrentView();
    }

    function quickSearch(query) {
        State.searchQuery = query;
        doSearch();
    }

    function clearSearch() {
        State.searchQuery = '';
        State.prompts = [];
        renderCurrentView();
    }

    async function changeCategory(cat) {
        State.currentCategory = cat;
        State.prompts = [];
        State.currentPage = 1;
        await loadPrompts();
        renderCurrentView();
    }

    async function changeSort(sort) {
        State.sortBy = sort;
        State.prompts = [];
        State.currentPage = 1;
        await loadPrompts();
        renderCurrentView();
    }

    async function loadMore() {
        State.currentPage++;
        await loadPrompts(true);
        renderCurrentView();
    }

    function exploreCategory(cat) {
        State.currentCategory = cat;
        switchView('explore');
    }

    function clearAllSaved() {
        if (confirm('Remove all saved prompts?')) {
            State.savedPrompts = [];
            localStorage.setItem('pv_saved', '[]');
            updateSavedNotif();
            renderCurrentView();
            showToast('All saved prompts cleared', 'fa-trash');
        }
    }

    // ==========================================
    // BACKGROUND AMBIENT EFFECT
    // ==========================================
    function createAmbientOrbs() {
        const container = document.createElement('div');
        container.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;';
        document.body.insertBefore(container, document.body.firstChild);

        const colors = ['rgba(6,214,160,0.04)', 'rgba(124,58,237,0.04)', 'rgba(6,182,212,0.03)'];
        for (let i = 0; i < 3; i++) {
            const orb = document.createElement('div');
            const size = 250 + Math.random() * 200;
            orb.style.cssText = `
                position: absolute;
                width: ${size}px; height: ${size}px;
                border-radius: 50%;
                background: ${colors[i]};
                filter: blur(80px);
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                animation: float ${6 + Math.random() * 4}s ease-in-out infinite;
                animation-delay: ${i * 2}s;
            `;
            container.appendChild(orb);
        }
    }

    // ==========================================
    // INFINITE SCROLL
    // ==========================================
    function setupInfiniteScroll() {
        const main = document.getElementById('mainContent');
        main.addEventListener('scroll', () => {
            if (State.currentView !== 'explore') return;
            const threshold = 300;
            if (main.scrollHeight - main.scrollTop - main.clientHeight < threshold) {
                if (!State.loading && State.hasMore && State.prompts.length > 0) {
                    loadMore();
                }
            }
        });
    }

    // ==========================================
    // INIT
    // ==========================================
    async function init() {
        createAmbientOrbs();
        updateSavedNotif();
        setupInfiniteScroll();

        // Render loading state first
        renderCurrentView();

        // Load prompts from default source
        await loadPrompts();
        renderCurrentView();
    }

    // Hide scrollbar for chip containers
    const style = document.createElement('style');
    style.textContent = `.hide-scrollbar::-webkit-scrollbar { display: none; } .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }`;
    document.head.appendChild(style);

    // Start the app
    init();
    </script>
</body>
</html>
