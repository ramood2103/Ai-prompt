<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>PromptVerse</title>
<meta name="theme-color" content="#0a0a0f">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#10101a;--bg3:#161625;--accent:#06d6a0;--accent2:#7c3aed;--accent3:#f59e0b;--text:#ededf5;--muted:#6e6e8a;--border:#262642;--danger:#f43f5e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden}
#app{max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative}
@media(min-width:481px){#app{border-left:1px solid var(--border);border-right:1px solid var(--border)}}
.topbar{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,15,.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(38,38,66,.5);flex-shrink:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:var(--bg);font-size:13px}
.topbar h1{font-size:15px;font-weight:700}.topbar .sub{font-size:10px;color:var(--muted)}
.ibtn{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.ibtn:hover{border-color:var(--accent);color:var(--accent)}
#main{flex:1;overflow-y:auto;overflow-x:hidden}
.nav{display:flex;justify-content:space-around;padding:6px 0 max(env(safe-area-inset-bottom),8px);background:rgba(10,10,15,.92);backdrop-filter:blur(16px);border-top:1px solid rgba(38,38,66,.5);flex-shrink:0}
.nav-i{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 14px;cursor:pointer;color:var(--muted);font-size:9px;font-weight:600;transition:.2s}
.nav-i.on{color:var(--accent)}.nav-i i{font-size:18px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s;position:relative}
.card:active{transform:scale(.97)}.card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--bg3)}
.card .ov{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:24px 8px 8px}
.card .ov p{font-size:10px;color:rgba(255,255,255,.9);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card .ft{padding:7px 10px;display:flex;align-items:center;justify-content:space-between}
.card .src{font-size:9px;color:var(--muted);background:var(--bg3);padding:2px 7px;border-radius:5px}
.sbtn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--muted);padding:2px}
.sbtn.on{color:var(--accent3)}
.chip{display:inline-flex;align-items:center;gap:3px;padding:5px 12px;border-radius:16px;font-size:11px;font-weight:500;background:var(--bg3);color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:.2s;border:1px solid transparent}
.chip.on{background:rgba(6,214,160,.12);color:var(--accent);border-color:rgba(6,214,160,.35)}
.chips{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:11px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.2s}
.btn:active{transform:scale(.95)}
.btn1{background:var(--accent);color:var(--bg)}.btn2{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.overlay{position:fixed;inset:0;z-index:100;background:var(--bg);transform:translateY(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);max-width:480px;margin:0 auto;overflow-y:auto}
.overlay.show{transform:translateY(0)}
.ohdr{position:sticky;top:0;z-index:10;background:rgba(10,10,15,.9);backdrop-filter:blur(16px);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.pbox{background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:12px;font-size:12px;line-height:1.7;color:#c0c0d8;word-break:break-word}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);font-size:10px;color:var(--muted)}
.toast-c{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none}
.toast{background:var(--bg3);color:var(--text);padding:8px 16px;border-radius:10px;font-size:12px;border:1px solid var(--border);box-shadow:0 6px 24px rgba(0,0,0,.5);animation:ti .3s ease;opacity:1;transition:opacity .3s}
@keyframes ti{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes bgShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.anim{animation:fadeUp .35s ease both}
.hero{background:linear-gradient(135deg,rgba(6,214,160,.06),rgba(124,58,237,.06));background-size:300% 300%;animation:bgShift 8s ease infinite}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:7px;font-size:9px;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--muted)}
.pill.ok{border-color:rgba(6,214,160,.3);color:var(--accent)}.pill.err{border-color:rgba(244,63,94,.3);color:var(--danger)}.pill.wait{border-color:rgba(245,158,11,.3);color:var(--accent3)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.sbar{display:flex;gap:5px;padding:10px 14px;flex-wrap:wrap}
.log{font-size:10px;padding:3px 0;border-bottom:1px solid rgba(38,38,66,.3);line-height:1.4}
.log .g{color:var(--accent)}.log .r{color:var(--danger)}.log .y{color:var(--accent3)}.log .d{color:var(--muted)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;text-align:center;color:var(--muted)}.empty i{font-size:40px;margin-bottom:12px;opacity:.2}
@media(prefers-reduced-motion:reduce){*{animation-duration:0s!important;transition-duration:0s!important}}
</style>
</head>

// ===== CATEGORY GUESS =====
function gcat(p, t) {
    var a = (p + ' ' + (t || []).join(' ')).toLowerCase();
    if (/anime|manga|waifu|ghibli/.test(a)) return 'anime';
    if (/portrait|face|girl|boy|woman|man/.test(a) && !/landscape|city|forest|ocean/.test(a)) return 'portrait';
    if (/landscape|mountain|forest|ocean|sunset|lake/.test(a)) return 'landscape';
    if (/fantasy|dragon|magic|wizard|elf|fairy|castle/.test(a)) return 'fantasy';
    if (/sci.?fi|cyberpunk|space|robot|mech|alien/.test(a)) return 'scifi';
    if (/photo|camera|bokeh|film|dslr/.test(a)) return 'photo';
    if (/abstract|fluid|fractal|geometric|surreal/.test(a)) return 'abstract';
    if (/3d|render|blender|octane|unreal|voxel/.test(a)) return '3d';
    if (/concept|design|environment|vehicle/.test(a)) return 'concept';
    if (/character|warrior|knight|samurai|witch/.test(a)) return 'character';
    if (/minimal|minimalist|clean|simple/.test(a)) return 'minimal';
    return 'concept';
}

// ===== CORS FETCH =====
function pfetch(url, ms) {
    ms = ms || 12000;
    var proxies = [
        url,
        'https://corsproxy.io/?' + encodeURIComponent(url),
        'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
        'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url)
    ];
    var delays = [0, 800, 2500, 5000];
    return new Promise(function(resolve, reject) {
        var done = false, failed = 0;
        proxies.forEach(function(u, i) {
            setTimeout(function() {
                if (done) return;
                var ctrl = new AbortController();
                var tid = setTimeout(function() { try { ctrl.abort(); } catch(e) {} }, ms);
                fetch(u, { signal: ctrl.signal }).then(function(r) {
                    clearTimeout(tid); if (done) return;
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.text();
                }).then(function(txt) {
                    if (done) return; done = true;
                    try { resolve(JSON.parse(txt)); } catch(e) { resolve(txt); }
                }).catch(function() {
                    clearTimeout(tid); failed++;
                    if (failed >= proxies.length && !done) { done = true; reject(new Error('All failed')); }
                });
            }, delays[i]);
        });
    });
}

// ===== GENERIC SCRAPER (Meigen, PromptSeen, GeminiPrompt, PromptSnap) =====
var UIJUNK = ['GraphicPoster','BrandVideos','AIImages','Home','Explore','Trending','Latest','Popular','Categories','About','Contact','Login','Sign Up','Register','Profile','Settings','Follow','Share','Download','Upload','Create','Generate','Free','Premium','Pricing','FAQ','Blog','Docs','API','Terms','Privacy','Facebook','Twitter','Instagram','Discord','YouTube','Cookie','Subscribe','Loading','404','Learn More','Get Started','Buy Now','Submit','Cancel','Close','Search','Filter','Sort','Refresh','Clear'];

function isJunk(t) {
    if (!t || t.length < 35) return true;
    for (var i = 0; i < UIJUNK.length; i++) { if (t === UIJUNK[i]) return true; }
    if (t.length < 60 && !t.includes(',') && !t.includes('.') && /^[A-Z][a-z]+([A-Z][a-z]+)+$/.test(t.replace(/\s/g, ''))) return true;
    return false;
}

function loadScrape(name, base) {
    log(name + ': fetching...', 'y');
    var urls = [base + '/api/prompts', base + '/api/v1/prompts', base + '/api/gallery', base + '/api/explore', base + '/', base + '/explore', base + '/trending', base + '/prompts'];
    var results = [];
    var idx = 0;
    return new Promise(function(resolve) {
        function next() {
            if (idx >= urls.length) { log(name + ' total: ' + results.length, results.length ? 'g' : 'r'); resolve(results); return; }
            var url = urls[idx]; idx++;
            pfetch(url, 10000).then(function(data) {
                // Try JSON
                if (data && typeof data === 'object') {
                    var found = xjson(data, name);
                    if (found.length > 0) { results = results.concat(found); log(name + ' API: ' + found.length, 'g'); resolve(results); return; }
                }
                // Try HTML
                if (typeof data === 'string' && data.length > 200) {
                    var hf = xhtml(data, name);
                    if (hf.length > 0) { results = results.concat(hf); log(name + ' HTML: ' + hf.length, 'g'); resolve(results); return; }
                }
                next();
            }).catch(function() { next(); });
        }
        next();
    });
}

function xjson(d, src, dep) {
    dep = dep || 0; if (dep > 5 || !d || typeof d !== 'object') return [];
    var out = [];
    if (Array.isArray(d)) {
        d.forEach(function(it) {
            if (it && typeof it === 'object' && typeof it.prompt === 'string' && it.prompt.length > 20) {
                out.push({ id: 'j' + Math.random().toString(36).substr(2, 6), prompt: it.prompt, neg: it.negativePrompt || it.negative || '', cat: gcat(it.prompt, []), model: it.model || '', steps: it.steps || 0, cfg: it.cfgScale || 0, sampler: it.sampler || '', seed: it.seed || 0, tags: [], likes: it.likes || 0, src: src, img: it.image || it.imageUrl || it.src || '' });
            }
            out = out.concat(xjson(it, src, dep + 1));
        });
    } else {
        Object.keys(d).forEach(function(k) {
            if (['prompts', 'items', 'data', 'list', 'results', 'gallery', 'images'].indexOf(k) !== -1 && Array.isArray(d[k])) {
                d[k].forEach(function(it) {
                    if (it && typeof it === 'object' && typeof it.prompt === 'string' && it.prompt.length > 20) {
                        out.push({ id: 'j' + Math.random().toString(36).substr(2, 6), prompt: it.prompt, neg: it.negativePrompt || '', cat: gcat(it.prompt, []), model: it.model || '', steps: it.steps || 0, cfg: it.cfgScale || 0, sampler: it.sampler || '', seed: it.seed || 0, tags: [], likes: it.likes || 0, src: src, img: it.image || it.imageUrl || it.src || '' });
                    }
                });
            }
            if (typeof d[k] === 'object') out = out.concat(xjson(d[k], src, dep + 1));
        });
    }
    return out;
}

function xhtml(html, src) {
    var items = [];
    // Try __NEXT_DATA__
    var nm = html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);
    if (nm) { try { var nd = JSON.parse(nm[1]); var nf = xjson(nd, src); if (nf.length) return nf; } catch(e) {} }
    // DOM
    try {
        var doc = new DOMParser().parseFromString(html, 'text/html');
        doc.querySelectorAll('nav,header,footer,menu,button,a,form,script,style').forEach(function(e) { e.remove(); });
        var seen = {};
        doc.querySelectorAll('p,div,span,article,section,li').forEach(function(el) {
            var t = el.textContent.trim();
            if (t.length < 35 || t.length > 1200 || isJunk(t)) return;
            var k = t.substring(0, 50).toLowerCase();
            if (seen[k]) return; seen[k] = true;
            items.push({ id: 'h' + Math.random().toString(36).substr(2, 6), prompt: t, neg: '', cat: gcat(t, []), model: '', steps: 0, cfg: 0, sampler: '', seed: 0, tags: [], likes: 0, src: src, img: '' });
        });
    } catch(e) {}
    return items;
}

        SVD.forEach(function(p, i) {
            h += '<div onclick="openDet(SVD[' + i + '].id)" style="display:flex;gap:10px;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;cursor:pointer;margin-bottom:6px">';
            h += '<div style="flex:1;min-width:0"><p style="font-size:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5">' + esc(p.prompt.substring(0, 120)) + '</p>';
            h += '<span style="font-size:9px;color:var(--accent)">' + (p.src || 'Built-in') + '</span></div>';
            h += '<button onclick="event.stopPropagation();sv(\'' + p.id + '\')" style="background:none;border:none;color:var(--accent3);cursor:pointer;font-size:12px;padding:4px"><i class="fas fa-bookmark"></i></button></div>';
        });
        h += '</section>';
    } else {
        h += '<div class="empty"><i class="fas fa-bookmark"></i><p style="font-size:14px;font-weight:600;margin-bottom:4px">No saved prompts</p><button onclick="nav(\'explore\')" class="btn btn1" style="margin-top:12px;font-size:11px"><i class="fas fa-compass"></i> Explore</button></div>';
    }
    h += '</div>';
    return h;
}

function card(p, idx) {
    var saved = isSaved(p.id);
    var hasImg = p.img && !IE[p.id];
    var h = '<div class="card anim" style="animation-delay:' + Math.min(idx * 35, 400) + 'ms" onclick="openDet(\'' + p.id + '\')">';
    if (hasImg) {
        h += '<div style="position:relative;overflow:hidden"><img src="' + p.img + '" loading="lazy" onerror="this.style.display=\'none\';IE[\'' + p.id + '\']=true">';
        h += '<div class="ov"><p>' + esc(p.prompt.substring(0, 100)) + '</p></div></div>';
    } else {
        h += '<div style="aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center;padding:10px;position:relative"><i class="fas fa-wand-magic-sparkles" style="font-size:22px;opacity:.12;position:absolute"></i>';
        h += '<p style="font-size:10px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:7;-webkit-box-orient:vertical;overflow:hidden;position:relative">' + esc(p.prompt.substring(0, 250)) + '</p></div>';
    }
    h += '<div class="ft"><span class="src">' + (p.src || 'Built-in') + '</span>';
    h += '<button class="sbtn ' + (saved ? 'on' : '') + '" onclick="event.stopPropagation();sv(\'' + p.id + '\')"><i class="fas fa-bookmark"></i></button></div></div>';
    return h;
}

// ===== DETAIL OVERLAY =====
function openDet(id) {
    var p = findP(id); if (!p) return;
    var saved = isSaved(id);
    var o = document.getElementById('detOv');
    var h = '<div class="ohdr"><button class="ibtn" onclick="closeDet()"><i class="fas fa-arrow-left"></i></button><div style="display:flex;gap:6px"><button class="ibtn" onclick="sv(\'' + id + '\')"><i class="fas fa-bookmark" style="color:' + (saved ? 'var(--accent3)' : 'var(--muted)') + '"></i></button><button class="ibtn" onclick="cp(findP(\'' + id + '\').prompt)"><i class="fas fa-copy"></i></button></div></div>';
    if (p.img) h += '<img src="' + p.img + '" style="width:100%;max-height:350px;object-fit:contain;background:var(--bg2)" onerror="this.style.display=\'none\'">';
    h += '<div style="padding:16px">';
    h += '<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap"><span class="pill ok">' + (p.src || 'Built-in') + '</span>';
    if (p.likes) h += '<span class="pill"><i class="fas fa-heart" style="color:var(--danger);font-size:8px"></i> ' + p.likes + '</span>';
    if (p.model) h += '<span class="pill">' + esc(p.model) + '</span>';
    h += '</div>';
    // Prompt
    h += '<div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;font-weight:700">Prompt</span><button onclick="cp(findP(\'' + id + '\').prompt)" class="btn btn2" style="padding:4px 10px;font-size:10px"><i class="fas fa-copy"></i> Copy</button></div>';
    h += '<div class="pbox">' + esc(p.prompt) + '</div></div>';
    // Neg
    if (p.neg) {
        h += '<div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;font-weight:700">Negative</span><button onclick="cp(findP(\'' + id + '\').neg)" class="btn btn2" style="padding:4px 10px;font-size:10px"><i class="fas fa-copy"></i> Copy</button></div>';
        h += '<div class="pbox" style="border-color:rgba(244,63,94,.2);background:rgba(244,63,94,.04)">' + esc(p.neg) + '</div></div>';
    }
    // Params
    if (p.model || p.steps || p.cfg || p.sampler) {
        h += '<div style="margin-bottom:18px"><span style="font-size:12px;font-weight:700;display:block;margin-bottom:8px">Parameters</span><div style="display:flex;flex-wrap:wrap;gap:5px">';
        if (p.model) h += '<span class="tag"><i class="fas fa-cube" style="color:var(--accent);font-size:9px"></i> ' + esc(p.model) + '</span>';
        if (p.steps) h += '<span class="tag"><i class="fas fa-shoe-prints" style="color:var(--accent2);font-size:9px"></i> ' + p.steps + '</span>';
        if (p.cfg) h += '<span class="tag"><i class="fas fa-sliders" style="color:var(--accent3);font-size:9px"></i> CFG ' + p.cfg + '</span>';
        if (p.sampler) h += '<span class="tag"><i class="fas fa-shuffle" style="color:#06b6d4;font-size:9px"></i> ' + esc(p.sampler) + '</span>';
        if (p.seed) h += '<span class="tag"><i class="fas fa-seedling" style="color:#a3e635;font-size:9px"></i> ' + p.seed + '</span>';
        h += '</div></div>';
    }
    // Tags
    if (p.tags && p.tags.length) {
        h += '<div style="margin-bottom:18px"><span style="font-size:12px;font-weight:700;display:block;margin-bottom:8px">Tags</span><div style="display:flex;flex-wrap:wrap;gap:5px">';
        p.tags.forEach(function(t) { h += '<span class="tag">#' + esc(typeof t === 'string' ? t : t.name || '') + '</span>'; });
        h += '</div></div>';
    }
    h += '<div style="display:flex;gap:8px;margin-top:20px"><button onclick="cp(findP(\'' + id + '\').prompt)" class="btn btn1" style="flex:1"><i class="fas fa-copy"></i> Copy Prompt</button><button onclick="sv(\'' + id + '\')" class="btn btn2" style="flex:1"><i class="fas fa-bookmark"></i> ' + (saved ? 'Unsave' : 'Save') + '</button></div>';
    h += '</div>';
    o.innerHTML = h;
    o.classList.add('show');
}
function closeDet() { document.getElementById('detOv').classList.remove('show'); }

// ===== SOURCE OVERLAY =====
function showSrc() {
    var defs = [
        { k: 'civitai', n: 'Civitai', i: 'fa-fire', c: '#06d6a0' },
        { k: 'lexica', n: 'Lexica', i: 'fa-search', c: '#7c3aed' },
        { k: 'meigen', n: 'Meigen AI', i: 'fa-language', c: '#f59e0b' },
        { k: 'promptseen', n: 'PromptSeen', i: 'fa-eye', c: '#06b6d4' },
        { k: 'geminiprompt', n: 'GeminiPrompt', i: 'fa-robot', c: '#8b5cf6' },
        { k: 'promptsnap', n: 'PromptSnap', i: 'fa-bolt', c: '#ef4444' },
        { k: 'github', n: 'GitHub', i: 'fa-code-branch', c: '#06b6d4' },
        { k: 'builtin', n: 'Built-in', i: 'fa-book', c: '#ec4899' }
    ];
    var h = '<div class="ohdr"><button class="ibtn" onclick="closeSrc()"><i class="fas fa-arrow-left"></i></button><span style="font-size:14px;font-weight:700">Data Sources</span><div></div></div>';
    h += '<div style="padding:14px">';
    // Status pills
    h += '<div style="display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap">';
    for (var k in ST) { var lbl = k === 'meigen' ? 'Meigen' : k === 'builtin' ? 'Built-in' : k.charAt(0).toUpperCase() + k.slice(1); h += '<span class="pill ' + ST[k] + '"><span class="dot"></span>' + lbl + '</span>'; }
    h += '</div>';
    // Cards
    h += '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">';
    defs.forEach(function(s) {
        h += '<div style="padding:12px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;gap:12px">';
        h += '<div style="width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:' + s.c + '18;color:' + s.c + ';flex-shrink:0"><i class="fas ' + s.i + '"></i></div>';
        h += '<div style="flex:1"><div style="font-weight:700;font-size:13px">' + s.n + '</div></div>';
        h += '<div style="font-size:20px;font-weight:800;color:' + (ST[s.k] === 'ok' ? s.c : 'var(--muted)') + '">' + (SC[s.k] || 0) + '</div></div>';
    });
    h += '</div>';
    // Log
    h += '<div style="margin-bottom:14px"><p style="font-size:12px;font-weight:700;margin-bottom:8px">Fetch Log</p>';
    h += '<div style="max-height:220px;overflow-y:auto;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px">';
    if (LG.length) {
        LG.slice(0, 25).forEach(function(l) {
            var cls = l.t === 'g' ? 'g' : l.t === 'r' ? 'r' : 'y';
            h += '<div class="log"><span class="' + cls + '">[' + (l.t === 'g' ? 'OK' : l.t === 'r' ? 'ERR' : '...') + ']</span> <span class="d">' + l.ts + '</span> ' + esc(l.m) + '</div>';
        });
    } else {
        h += '<div style="font-size:10px;color:var(--muted);padding:6px">Waiting...</div>';
    }
    h += '</div></div>';
    // Info
    h += '<div style="padding:10px;border-radius:10px;background:var(--bg3);border:1px solid var(--border)">';
    h += '<p style="font-size:10px;color:var(--muted);line-height:1.6"><i class="fas fa-circle-info" style="color:var(--accent)"></i> Total: <strong style="color:var(--text)">' + P.length + '</strong> prompts. Built-in always works. External sources depend on CORS proxies.</p></div>';
    h += '</div>';
    document.getElementById('srcOv').innerHTML = h;
    document.getElementById('srcOv').classList.add('show');
}
function closeSrc() { document.getElementById('srcOv').classList.remove('show'); }

function doRefresh() {
    var icon = document.getElementById('ricon');
    icon.style.animation = 'spin .8s linear infinite';
    LG = []; ST = {};
    P = builtIn.slice();
    countSrc(); updHdr(); draw();
    fetchExternal();
    setTimeout(function() { icon.style.animation = ''; }, 3000);
    toast('Refreshing...');
}

// ===== AMBIENT =====
(function() {
    var c = document.createElement('div');
    c.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden';
    document.body.insertBefore(c, document.body.firstChild);
    ['rgba(6,214,160,.03)', 'rgba(124,58,237,.03)', 'rgba(6,182,212,.025)'].forEach(function(col, i) {
        var o = document.createElement('div');
        var sz = 180 + Math.random() * 200;
        o.style.cssText = 'position:absolute;width:' + sz + 'px;height:' + sz + 'px;border-radius:50%;background:' + col + ';filter:blur(60px);left:' + (Math.random() * 100) + '%;top:' + (Math.random() * 100) + '%;animation:float ' + (5 + Math.random() * 3) + 's ease-in-out infinite;animation-delay:' + (i * 1.5) + 's';
        c.appendChild(o);
    });
})();

// ===== SPIN KEYFRAME (for refresh) =====
var ss = document.createElement('style');
ss.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
document.head.appendChild(ss);

// ===== START =====
initApp();
</script>
</body>
</html>
