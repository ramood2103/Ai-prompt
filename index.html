<style>
:root{--bg:#08080d;--bg2:#0e0e18;--bg3:#151522;--bg4:#1b1b30;--accent:#06d6a0;--accent2:#7c3aed;--accent3:#f59e0b;--text:#ededf5;--muted:#6e6e8a;--border:#222240;--danger:#f43f5e}

#app{max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative}

.rtype.recolor{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}

@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.anim{animation:fu .35s ease both}
.hero{background:linear-gradient(135deg,rgba(6,214,160,.06),rgba(124,58,237,.06),rgba(6,214,160,.03));background-size:300% 300%;animation:bs 8s ease infinite}
@media(prefers-reduced-motion:reduce){*{animation-duration:0s!important;transition-duration:0s!important}}
</style>
</head>

function pfetch(url,ms){
    ms=ms||12000;
    var proxies=[url,'https://corsproxy.io/?'+encodeURIComponent(url),'https://api.allorigins.win/raw?url='+encodeURIComponent(url),'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(url)];
    var delays=[0,800,2500,5000];
    return new Promise(function(resolve,reject){
        var done=false,failed=0;
        proxies.forEach(function(u,i){
            setTimeout(function(){
                if(done)return;
                var ctrl=new AbortController();
                var tid=setTimeout(function(){try{ctrl.abort()}catch(e){}},ms);
                fetch(u,{signal:ctrl.signal}).then(function(r){clearTimeout(tid);if(done)return;if(!r.ok)throw new Error('HTTP '+r.status);return r.text()}).then(function(txt){if(done)return;done=true;try{resolve(JSON.parse(txt))}catch(e){resolve(txt)}}).catch(function(){clearTimeout(tid);failed++;if(failed>=proxies.length&&!done){done=true;reject(new Error('All failed'))}});
            },delays[i]);
        });
    });
}

var UIJUNK=['GraphicPoster','BrandVideos','AIImages','Home','Explore','Trending','Latest','Popular','Categories','About','Contact','Login','Sign Up','Register','Profile','Settings','Follow','Share','Download','Upload','Create','Generate','Free','Premium','Pricing','FAQ','Blog','Docs','API','Terms','Privacy','Facebook','Twitter','Instagram','Discord','YouTube','Cookie','Subscribe','Loading','404','Learn More','Get Started','Buy Now','Submit','Cancel','Close','Search','Filter','Sort','Refresh','Clear'];
function isJunk(t){if(!t||t.length<30)return true;for(var i=0;i<UIJUNK.length;i++){if(t===UIJUNK[i])return true}if(t.length<60&&!t.includes(',')&&!t.includes('.')&&/^[A-Z][a-z]+([A-Z][a-z]+)+$/.test(t.replace(/\s/g,'')))return true;return false}

function loadScrape(name,base){
    log(name+': fetching...','y');
    var urls=[base+'/api/prompts',base+'/api/v1/prompts',base+'/api/gallery',base+'/api/explore',base+'/api/search?q=style+transfer',base+'/',base+'/explore',base+'/trending',base+'/prompts',base+'/categories'];
    var results=[];var idx=0;
    return new Promise(function(resolve){
        function next(){
            if(idx>=urls.length){log(name+' total: '+results.length,results.length?'g':'r');resolve(results);return}
            var url=urls[idx];idx++;
            pfetch(url,10000).then(function(data){
                if(data&&typeof data==='object'){var found=xj(data,name);if(found.length>0){results=results.concat(found);log(name+': '+found.length+' prompts','g');resolve(results);return}}
                if(typeof data==='string'&&data.length>200){var hf=xh(data,name);if(hf.length>0){results=results.concat(hf);log(name+': '+hf.length+' from HTML','g');resolve(results);return}}
                next();
            }).catch(function(){next()});
        }
        next();
    });
}

function xj(d,src,dep){
    dep=dep||0;if(dep>5||!d||typeof d!=='object')return[];
    var out=[];
    if(Array.isArray(d)){d.forEach(function(it){if(it&&typeof it==='object'&&typeof it.prompt==='string'&&it.prompt.length>20){out.push({id:'j'+Math.random().toString(36).substr(2,6),prompt:it.prompt,neg:it.negativePrompt||it.negative||'',cat:guessRC(it.prompt),model:it.model||'Google AI',steps:0,cfg:0,sampler:'',seed:0,tags:it.tags||[],likes:it.likes||0,src:src,img:it.image||it.imageUrl||it.src||'',rtype:guessRC(it.prompt)})}out=out.concat(xj(it,src,dep+1))})}
    else{Object.keys(d).forEach(function(k){if(['prompts','items','data','list','results','gallery','images'].indexOf(k)!==-1&&Array.isArray(d[k])){d[k].forEach(function(it){if(it&&typeof it==='object'&&typeof it.prompt==='string'&&it.prompt.length>20){out.push({id:'j'+Math.random().toString(36).substr(2,6),prompt:it.prompt,neg:it.negativePrompt||'',cat:guessRC(it.prompt),model:it.model||'Google AI',steps:0,cfg:0,sampler:'',seed:0,tags:it.tags||[],likes:it.likes||0,src:src,img:it.image||it.imageUrl||it.src||'',rtype:guessRC(it.prompt)})}})}if(typeof d[k]==='object')out=out.concat(xj(d[k],src,dep+1))})}
    return out;
}

function xh(html,src){
    var items=[];
    try{var nm=html.match(/<script id="__NEXT_DATA__"[^>]*>([\s\S]*?)<\/script>/);if(nm){var nd=JSON.parse(nm[1]);var nf=xj(nd,src);if(nf.length)return nf}}catch(e){}
    try{var doc=new DOMParser().parseFromString(html,'text/html');doc.querySelectorAll('nav,header,footer,menu,button,a,form,script,style').forEach(function(e){e.remove()});var seen={};doc.querySelectorAll('p,div,span,article,section,li').forEach(function(el){var t=el.textContent.trim();if(t.length<30||t.length>1000||isJunk(t))return;var k=t.substring(0,50).toLowerCase();if(seen[k])return;seen[k]=true;items.push({id:'h'+Math.random().toString(36).substr(2,6),prompt:t,neg:'',cat:guessRC(t),model:'Google AI',steps:0,cfg:0,sampler:'',seed:0,tags:[],likes:0,src:src,img:'',rtype:guessRC(t)})})}catch(e){}
    return items;
}

function guessRC(p){
    var a=(p||'').toLowerCase();
    if(/style|painting|ghibli|anime|oil|watercolor|comic|pixel|art nouveau|ukiyo|pop art|stained|brushstroke/.test(a))return'style';
    if(/background|bg|scene|replace.*background|change.*background|sky|landscape behind/.test(a))return'bg';
    if(/outfit|dress|clothing|wear|kimono|suit|armor|gown|fashion/.test(a))return'outfit';
    if(/edit|modify|add|remove|change.*expression|lighting|rain|snow|season|age|younger|older/.test(a))return'edit';
    if(/enhance|upscale|retouch|improve|sharp|detail|denoise|resolution|quality/.test(a))return'enhance';
    if(/recolor|color|hair color|eye color|palette|tone|tint|sepia/.test(a))return'recolor';
    if(/remix|morph|transform|double exposure|tilt.shift|vaporwave|sculpture|miniature/.test(a))return'remesh';
    if(/portrait|makeup|gaze|face|hair style|beauty/.test(a))return'portrait';
    if(/anime|manga|shonen|shoujo/.test(a))return'anime';
    if(/photo|film|camera|lomo|exposure|black.white|monochrome/.test(a))return'photo';
    return'edit';
}

    var h='<div class="ohdr"><button class="ib" onclick="closeDet()"><i class="fas fa-arrow-left"></i></button><div style="display:flex;gap:6px"><button class="ib" onclick="sv(\''+id+'\')"><i class="fas fa-bookmark" style="color:'+(saved?'var(--accent3)':'var(--muted)')+'"></i></button><button class="ib" onclick="cp(findP(\''+id+'\').prompt)"><i class="fas fa-copy"></i></button></div></div>';
    if(p.img)h+='<img src="'+p.img+'" style="width:100%;max-height:300px;object-fit:contain;background:var(--bg2)" onerror="this.style.display=\'none\'">';
    h+='<div style="padding:16px">';
    h+='<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap"><span class="rtype '+p.cat+'">'+catLabel(p.cat)+'</span><span class="pill ok">'+p.src+'</span>';if(p.likes)h+='<span class="pill"><i class="fas fa-heart" style="color:var(--danger);font-size:8px"></i> '+p.likes+'</span>';h+='</div>';
    // How to use
    h+='<div style="background:rgba(6,214,160,.06);border:1px solid rgba(6,214,160,.15);border-radius:10px;padding:10px;margin-bottom:16px;display:flex;gap:10px;align-items:center"><i class="fas fa-lightbulb" style="color:var(--accent);font-size:14px;flex-shrink:0"></i><p style="font-size:10px;color:var(--muted);line-height:1.5">Upload your reference image to Google AI image editor, then paste this prompt to generate the edited result.</p></div>';
    // Prompt
    h+='<div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;font-weight:700">Prompt</span><button onclick="cp(findP(\''+id+'\').prompt)" class="btn b2" style="padding:4px 10px;font-size:10px"><i class="fas fa-copy"></i> Copy</button></div><div class="pbox">'+esc(p.prompt)+'</div></div>';
    if(p.neg){h+='<div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;font-weight:700">Negative</span><button onclick="cp(findP(\''+id+'\').neg)" class="btn b2" style="padding:4px 10px;font-size:10px"><i class="fas fa-copy"></i> Copy</button></div><div class="pbox" style="border-color:rgba(244,63,94,.2);background:rgba(244,63,94,.04)">'+esc(p.neg)+'</div></div>'}
    if(p.tags&&p.tags.length){h+='<div style="margin-bottom:18px"><span style="font-size:12px;font-weight:700;display:block;margin-bottom:8px">Tags</span><div style="display:flex;flex-wrap:wrap;gap:5px">';p.tags.forEach(function(t){h+='<span class="tag">#'+esc(typeof t==='string'?t:t.name||'')+'</span>'});h+='</div></div>'}
    h+='<div style="display:flex;gap:8px;margin-top:20px"><button onclick="cp(findP(\''+id+'\').prompt)" class="btn b1" style="flex:1"><i class="fas fa-copy"></i> Copy Prompt</button><button onclick="sv(\''+id+'\')" class="btn b2" style="flex:1"><i class="fas fa-bookmark"></i> '+(saved?'Unsave':'Save')+'</button></div>';
    h+='</div>';o.innerHTML=h;o.classList.add('show');
}
function closeDet(){document.getElementById('detOv').classList.remove('show')}

// ===== SOURCE OVERLAY =====
function showSrc(){
    var defs=[{k:'meigen',n:'Meigen AI',i:'fa-language',c:'#f59e0b'},{k:'promptseen',n:'PromptSeen',i:'fa-eye',c:'#06b6d4'},{k:'geminiprompt',n:'GeminiPrompt',i:'fa-robot',c:'#8b5cf6'},{k:'promptsnap',n:'PromptSnap',i:'fa-bolt',c:'#ef4444'},{k:'builtin',n:'Built-in',i:'fa-book',c:'#ec4899'}];
    var h='<div class="ohdr"><button class="ib" onclick="closeSrc()"><i class="fas fa-arrow-left"></i></button><span style="font-size:14px;font-weight:700">Data Sources</span><div></div></div><div style="padding:14px">';
    h+='<div style="display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap">';for(var k in ST){var lbl=k==='meigen'?'Meigen':k==='builtin'?'Built-in':k.charAt(0).toUpperCase()+k.slice(1);h+='<span class="pill '+ST[k]+'"><span class="dot"></span>'+lbl+'</span>'}h+='</div>';
    h+='<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">';defs.forEach(function(s){h+='<div style="padding:12px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;gap:12px"><div style="width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:'+s.c+'18;color:'+s.c+';flex-shrink:0"><i class="fas '+s.i+'"></i></div><div style="flex:1"><div style="font-weight:700;font-size:13px">'+s.n+'</div></div><div style="font-size:20px;font-weight:800;color:'+(ST[s.k]==='ok'?s.c:'var(--muted)')+'">'+(SC[s.k]||0)+'</div></div>'});h+='</div>';
    h+='<div style="margin-bottom:14px"><p style="font-size:12px;font-weight:700;margin-bottom:8px">Fetch Log</p><div style="max-height:220px;overflow-y:auto;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px">';if(LG.length)LG.slice(0,25).forEach(function(l){h+='<div class="log"><span class="'+(l.t==='g'?'g':l.t==='r'?'r':'y')+'">['+(l.t==='g'?'OK':l.t==='r'?'ERR':'...')+']</span> <span class="d">'+l.ts+'</span> '+esc(l.m)+'</div>'});else h+='<div style="font-size:10px;color:var(--muted);padding:6px">Waiting...</div>';h+='</div></div>';
    h+='<div style="padding:10px;border-radius:10px;background:var(--bg3);border:1px solid var(--border)"><p style="font-size:10px;color:var(--muted);line-height:1.6"><i class="fas fa-circle-info" style="color:var(--accent)"></i> These prompts are for <strong style="color:var(--text)">reference image + prompt</strong> editing. Upload your photo as reference, then paste the prompt in Google AI or similar tools. Total: <strong style="color:var(--text)">'+P.length+'</strong> prompts.</p></div></div>';
    document.getElementById('srcOv').innerHTML=h;document.getElementById('srcOv').classList.add('show');
}
function closeSrc(){document.getElementById('srcOv').classList.remove('show')}
function doRef(){var icon=document.getElementById('ricon');icon.style.animation='spin .8s linear infinite';LG=[];ST={};P=builtIn.slice();countS();updH();draw();fetchExt();setTimeout(function(){icon.style.animation=''},3000);toast('Refreshing...')}

// ===== AMBIENT =====
(function(){var c=document.createElement('div');c.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden';document.body.insertBefore(c,document.body.firstChild);['rgba(6,214,160,.03)','rgba(124,58,237,.03)'].forEach(function(col,i){var o=document.createElement('div');var sz=180+Math.random()*200;o.style.cssText='position:absolute;width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+col+';filter:blur(60px);left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;animation:fl '+(5+Math.random()*3)+'s ease-in-out infinite;animation-delay:'+(i*1.5)+'s';c.appendChild(o)})})();

// ===== START =====
initApp();
</script>
